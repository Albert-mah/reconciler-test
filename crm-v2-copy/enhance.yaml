popups:
- target: $customers.table.actions.addNew
  auto:
  - edit
  coll: nb_crm_customers
  blocks:
  - key: form
    type: createForm
    resource:
      binding: currentCollection
    fields:
    - name
    - type
    - region
    - level
    - status
    - owner
    - phone
    - website
    field_layout:
    - '--- 基本信息 ---'
    - - name
      - type
      - level
    - - region
      - status
    - '--- 负责人 ---'
    - - owner
    - '--- 联系方式 ---'
    - - phone
      - website
    actions:
    - submit
- target: $customers.table.fields.name
  mode: embed
  coll: nb_crm_customers
  tabs:
  - blocks:
    - key: details_0
      type: details
      coll: nb_crm_customers
      resource_binding:
        filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
      fields:
      - level
      - type
      - region
      js_items:
      - desc: Customer Statistics Block
        file: ./js/customers_popup_name_tab0_details_0_customer_statistics_block.js
      - desc: item_profile - Customer Profile Header
        file: ./js/customers_popup_name_tab0_details_0_item_profile_customer_profile_header.js
      field_layout:
      - - '[JS:item_profile - Customer Profile Header]'
      - - level
        - region
        - type
      - - '[JS:Customer Statistics Block]'
      actions:
      - edit
    - key: details_1
      type: details
      coll: nb_crm_customers
      resource_binding:
        filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
      js_items:
      - desc: AI Smart Profile Block
        file: ./js/customers_popup_name_tab0_details_1_ai_smart_profile_block.js
    - key: contacts
      type: list
      title: Contacts
      coll: nb_crm_contacts
      resource_binding:
        associationName: nb_crm_customers.contacts
        sourceId: '{{ctx.view.inputArgs.filterByTk}}'
      item_fields:
      - email
      - phone
      item_js:
      - desc: Contact Row Column - Customer 360
        file: ./js/customers_popup_name_tab0_contacts_contact_row_column_customer_360.js
      item_layout:
      - - '[JS:Contact Row Column - Customer 360]'
      - - email
        - phone
      item_actions:
      - edit
      actions:
      - filter
      - refresh
      - addNew
    - key: opportunities
      type: list
      title: Opportunities
      coll: nb_crm_opportunities
      resource_binding:
        associationName: nb_crm_customers.opportunities
        sourceId: '{{ctx.view.inputArgs.filterByTk}}'
      item_js:
      - desc: Opportunity Row Column - Customer 360
        file: ./js/customers_popup_name_tab0_opportunities_opportunity_row_column_customer_360.js
    - key: comments_4
      type: comments
      coll: nb_crm_comments
      resource_binding:
        associationName: nb_crm_customers.comments
        sourceId: '{{ctx.view.inputArgs.filterByTk}}'
    layout:
    - - col:
        - details_0
        - opportunities
        size: 16
      - col:
        - contacts
        - details_1
        - comments_4
        size: 8
    title: Tab0
  - blocks:
    - key: recordHistory_0
      type: recordHistory
      coll: nb_crm_customers
    title: Tab1
