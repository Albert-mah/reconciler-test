module: Human Resource Management
icon: teamoutlined
collections:
  hrm_employees:
    title: Employees
    fields:
    - name: emp_code
      interface: input
      title: Employee Code
    - name: name
      interface: input
      title: Name
    - name: department
      interface: input
      title: Department
    - name: position
      interface: input
      title: Position
    - name: hire_date
      interface: datetime
      title: Hire Date
    - name: status
      interface: select
      title: Status
      options:
      - Active
      - On Leave
      - Resigned
      - Terminated
    - name: gender
      interface: select
      title: Gender
      options:
      - Male
      - Female
    - name: phone
      interface: input
      title: Phone
    - name: email
      interface: input
      title: Email
    - name: emergency_contact
      interface: input
      title: Emergency Contact
    - name: salary
      interface: number
      title: Salary
    - name: bank_account
      interface: input
      title: Bank Account
  hrm_departments:
    title: Departments
    fields:
    - name: code
      interface: input
      title: Department Code
    - name: name
      interface: input
      title: Department Name
    - name: manager
      interface: input
      title: Manager
    - name: parent_dept
      interface: input
      title: Parent Department
    - name: headcount
      interface: integer
      title: Headcount
    - name: budget
      interface: number
      title: Budget
    - name: status
      interface: select
      title: Status
      options:
      - Active
      - Inactive
  hrm_attendance:
    title: Attendance
    fields:
    - name: emp_name
      interface: input
      title: Employee
    - name: date
      interface: datetime
      title: Date
    - name: check_in
      interface: input
      title: Check In
    - name: check_out
      interface: input
      title: Check Out
    - name: status
      interface: select
      title: Status
      options:
      - Present
      - Late
      - Absent
      - Leave
      - Holiday
    - name: work_hours
      interface: number
      title: Work Hours
    - name: overtime_hours
      interface: number
      title: Overtime Hours
    - name: remark
      interface: textarea
      title: Remark
  hrm_leave_requests:
    title: Leave Requests
    fields:
    - name: emp_name
      interface: input
      title: Employee
    - name: leave_type
      interface: select
      title: Leave Type
      options:
      - Annual
      - Sick
      - Personal
      - Maternity
      - Unpaid
    - name: start_date
      interface: datetime
      title: Start Date
    - name: end_date
      interface: datetime
      title: End Date
    - name: days
      interface: number
      title: Days
    - name: status
      interface: select
      title: Status
      options:
      - Pending
      - Approved
      - Rejected
      - Cancelled
    - name: reason
      interface: textarea
      title: Reason
    - name: approver
      interface: input
      title: Approver
  hrm_payroll:
    title: Payroll
    fields:
    - name: emp_name
      interface: input
      title: Employee
    - name: period
      interface: input
      title: Period
    - name: base_salary
      interface: number
      title: Base Salary
    - name: overtime_pay
      interface: number
      title: Overtime Pay
    - name: bonus
      interface: number
      title: Bonus
    - name: deductions
      interface: number
      title: Deductions
    - name: tax
      interface: number
      title: Tax
    - name: net_pay
      interface: number
      title: Net Pay
    - name: status
      interface: select
      title: Status
      options:
      - Draft
      - Calculated
      - Approved
      - Paid
  hrm_recruitment:
    title: Recruitment
    fields:
    - name: position
      interface: input
      title: Position
    - name: department
      interface: input
      title: Department
    - name: candidates
      interface: integer
      title: Candidates
    - name: status
      interface: select
      title: Status
      options:
      - Open
      - Screening
      - Interviewing
      - Offer
      - Closed
      - Cancelled
    - name: priority
      interface: select
      title: Priority
      options:
      - Urgent
      - High
      - Normal
      - Low
    - name: posted_date
      interface: datetime
      title: Posted Date
    - name: deadline
      interface: datetime
      title: Deadline
    - name: recruiter
      interface: input
      title: Recruiter
    - name: remark
      interface: textarea
      title: Remark
pages:
- page: Employees
  icon: useroutlined
  coll: hrm_employees
  blocks:
  - key: filter
    type: filterForm
    fields:
    - field: name
      label: Search
      filterPaths:
      - emp_code
      - name
      - department
      - position
      - phone
    - field: status
      label: Status
    js_items:
    - desc: Filter Stats Button Group Block Template (CRM-style)
      file: ./js/filter_employees.js
    field_layout:
    - - '[JS:Filter Stats Button Group Block Template (CRM-style)]'
    - - name
      - status
  - key: table
    type: table
    fields:
    - emp_code
    - hire_date
    - position
    - name
    - department
    - gender
    - phone
    - salary
    - status
    js_columns:
    - title: Tenure
      desc: Tenure — Years+months since hire_date
      file: ./js/col_tenure.js
    - title: Salary Band
      desc: Salary Band Tag — by salary range
      file: ./js/col_salary_band.js
    actions:
    - filter
    - refresh
    - addNew
    - export
    recordActions:
    - edit
    - delete
  layout:
  - - filter
  - - table
- page: Departments
  icon: apartmentoutlined
  coll: hrm_departments
  blocks:
  - key: filter
    type: filterForm
    fields:
    - field: name
      label: Search
      filterPaths:
      - code
      - name
      - manager
    - field: status
      label: Status
    js_items:
    - desc: Filter Stats Button Group Block Template (CRM-style)
      file: ./js/filter_departments.js
    field_layout:
    - - '[JS:Filter Stats Button Group Block Template (CRM-style)]'
    - - name
      - status
  - key: table
    type: table
    fields:
    - parent_dept
    - code
    - headcount
    - name
    - manager
    - budget
    - status
    js_columns:
    - title: Budget Util
      desc: Budget Utilization — Progress bar (headcount * avg salary vs budget)
      file: ./js/col_budget_util.js
    actions:
    - filter
    - refresh
    - addNew
    - export
    recordActions:
    - edit
    - delete
  layout:
  - - filter
  - - table
- page: Attendance
  icon: clockcircleoutlined
  coll: hrm_attendance
  blocks:
  - key: filter
    type: filterForm
    fields:
    - field: emp_name
      label: Search
      filterPaths:
      - emp_name
    - field: status
      label: Status
    js_items:
    - desc: Filter Stats Button Group Block Template (CRM-style)
      file: ./js/filter_attendance.js
    field_layout:
    - - '[JS:Filter Stats Button Group Block Template (CRM-style)]'
    - - emp_name
      - status
  - key: table
    type: table
    fields:
    - check_out
    - work_hours
    - emp_name
    - overtime_hours
    - check_in
    - remark
    - date
    - status
    js_columns:
    - title: Hours
      desc: Work Hours Indicator Tag
      file: ./js/col_hours.js
    actions:
    - filter
    - refresh
    - addNew
    - export
    recordActions:
    - edit
    - delete
  layout:
  - - filter
  - - table
- page: Leave Requests
  icon: calendaroutlined
  coll: hrm_leave_requests
  blocks:
  - key: filter
    type: filterForm
    fields:
    - field: leave_type
      label: Type
    - field: emp_name
      label: Search
      filterPaths:
      - emp_name
      - approver
    - field: status
      label: Status
    js_items:
    - desc: Filter Stats Button Group Block Template (CRM-style)
      file: ./js/filter_leave.js
    field_layout:
    - - '[JS:Filter Stats Button Group Block Template (CRM-style)]'
    - - emp_name
      - status
      - leave_type
  - key: table
    type: table
    fields:
    - leave_type
    - emp_name
    - end_date
    - approver
    - start_date
    - days
    - reason
    - status
    js_columns:
    - title: Duration
      desc: Leave Days Count with Color
      file: ./js/col_leave_days.js
    actions:
    - filter
    - refresh
    - addNew
    - export
    recordActions:
    - edit
    - delete
  layout:
  - - filter
  - - table
- page: Payroll
  icon: dollaroutlined
  coll: hrm_payroll
  blocks:
  - key: filter
    type: filterForm
    fields:
    - field: emp_name
      label: Search
      filterPaths:
      - emp_name
      - period
    - field: status
      label: Status
    js_items:
    - desc: Filter Stats Button Group Block Template (CRM-style)
      file: ./js/filter_payroll.js
    field_layout:
    - - '[JS:Filter Stats Button Group Block Template (CRM-style)]'
    - - emp_name
      - status
  - key: table
    type: table
    fields:
    - period
    - emp_name
    - tax
    - base_salary
    - status
    - bonus
    - overtime_pay
    - deductions
    - net_pay
    js_columns:
    - title: Net Pay
      desc: Formatted Net Pay Amount
      file: ./js/col_net_pay.js
    actions:
    - filter
    - refresh
    - addNew
    - export
    recordActions:
    - edit
    - delete
  layout:
  - - filter
  - - table
- page: Recruitment
  icon: solutionoutlined
  coll: hrm_recruitment
  blocks:
  - key: filter
    type: filterForm
    fields:
    - field: priority
      label: Priority
    - field: position
      label: Search
      filterPaths:
      - position
      - department
      - recruiter
    - field: status
      label: Status
    js_items:
    - desc: Filter Stats Button Group Block Template (CRM-style)
      file: ./js/filter_recruitment.js
    field_layout:
    - - '[JS:Filter Stats Button Group Block Template (CRM-style)]'
    - - position
      - status
      - priority
  - key: table
    type: table
    fields:
    - priority
    - posted_date
    - position
    - recruiter
    - candidates
    - deadline
    - department
    - status
    js_columns:
    - title: Days Open
      desc: Days Since Posted — recruitment age
      file: ./js/col_recruit_age.js
    actions:
    - filter
    - refresh
    - addNew
    - export
    recordActions:
    - edit
    - delete
  layout:
  - - filter
  - - table
- page: Dashboard
  icon: dashboardoutlined
  blocks:
  - key: kpi_headcount
    type: jsBlock
    desc: Total Employees KPI Card
    file: ./js/kpi_headcount.js
  - key: kpi_attendance
    type: jsBlock
    desc: Attendance Rate KPI Card
    file: ./js/kpi_attendance.js
  - key: kpi_leave
    type: jsBlock
    desc: Pending Leaves KPI Card
    file: ./js/kpi_leave.js
  - key: kpi_openings
    type: jsBlock
    desc: Open Positions KPI Card
    file: ./js/kpi_openings.js
  - key: chart_dept_headcount
    type: chart
    chart_config: ./charts/dept_headcount.json
  - key: chart_attendance_trend
    type: chart
    chart_config: ./charts/attendance_trend.json
  - key: chart_leave_distribution
    type: chart
    chart_config: ./charts/leave_distribution.json
  - key: chart_recruitment_pipeline
    type: chart
    chart_config: ./charts/recruitment_pipeline.json
  layout:
  - - kpi_headcount
    - kpi_attendance
    - kpi_leave
    - kpi_openings
  - - chart_dept_headcount
    - chart_attendance_trend
  - - chart_leave_distribution
    - chart_recruitment_pipeline
