popups:
- target: $projects.table.actions.addNew
  auto:
  - edit
  - view
  view_field: code
  coll: pm_projects
  blocks:
  - key: form
    type: createForm
    resource:
      binding: currentCollection
    fields:
    - code
    - name
    - client
    - manager
    - status
    - budget
    - start_date
    - end_date
    actions:
    - submit
    field_layout:
    - '--- Basic Info ---'
    - - code
      - name
      - status
    - - client
      - manager
    - '--- Budget ---'
    - - budget
    - '--- Schedule ---'
    - - start_date
      - end_date
- target: $tasks.table.actions.addNew
  auto:
  - edit
  coll: pm_tasks
  blocks:
  - key: form
    type: createForm
    resource:
      binding: currentCollection
    fields:
    - title
    - project_name
    - assignee
    - priority
    - status
    - due_date
    - estimated_hours
    - actual_hours
    actions:
    - submit
    field_layout:
    - '--- Task Info ---'
    - - title
      - project_name
      - status
    - - assignee
      - priority
    - '--- Schedule ---'
    - - due_date
    - '--- Hours ---'
    - - estimated_hours
      - actual_hours
- target: $timesheets.table.actions.addNew
  auto:
  - edit
  coll: pm_timesheets
  blocks:
  - key: form
    type: createForm
    resource:
      binding: currentCollection
    fields:
    - emp_name
    - project_name
    - task_title
    - date
    - hours
    - billable
    - status
    actions:
    - submit
    field_layout:
    - '--- Entry ---'
    - - emp_name
      - project_name
      - task_title
    - - date
      - hours
    - '--- Billing ---'
    - - billable
      - status
- target: $milestones.table.actions.addNew
  auto:
  - edit
  coll: pm_milestones
  blocks:
  - key: form
    type: createForm
    resource:
      binding: currentCollection
    fields:
    - project_name
    - title
    - due_date
    - status
    - completion_pct
    actions:
    - submit
    field_layout:
    - '--- Milestone ---'
    - - project_name
      - title
