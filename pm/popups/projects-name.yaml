target: $projects.table.fields.name
field: name
mode: embed
coll: pm_projects
tabs:
- title: Overview
  blocks:
  - key: detail_main
    type: details
    coll: pm_projects
    resource:
      binding: currentRecord
    fields:
    - code
    - name
    - client
    - manager
    - status
    - start_date
    - end_date
    js_items:
    - desc: Project Detail KPI
      file: ./js/detail_project_kpi.js
    field_layout:
    - - '[JS:Project Detail KPI]'
    - '--- Basic Info ---'
    - - code
      - name
      - status
    - - client
      - manager
    - '--- Schedule ---'
    - - start_date
      - end_date
    recordActions:
    - edit
  - key: detail_aux
    type: details
    coll: pm_projects
    resource:
      binding: currentRecord
    fields:
    - budget
    field_layout:
    - '--- Budget ---'
    - - budget
  layout:
  - - col:
      - detail_main
      size: 16
    - col:
      - detail_aux
      size: 8
- title: History
  blocks:
  - key: recordHistory_0
    type: recordHistory
    coll: pm_projects
