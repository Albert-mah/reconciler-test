name: nb_pm_milestones
title: 里程碑
titleField: name
fields:
  - name: name
    interface: input
    title: 里程碑名称
    required: true
  - name: project
    interface: m2o
    title: 所属项目
    target: nb_pm_projects
    required: true
  - name: owner
    interface: input
    title: 负责人
  - name: planned_date
    interface: dateOnly
    title: 计划完成日期
  - name: completed_date
    interface: dateOnly
    title: 实际完成日期
  - name: status
    interface: select
    title: 里程碑状态
    default: pending
    options:
      - value: pending
        label: 未开始
      - value: in_progress
        label: 进行中
      - value: done
        label: 已完成
      - value: delayed
        label: 已延期
  - name: description
    interface: textarea
    title: 说明
