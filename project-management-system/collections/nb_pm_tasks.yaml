name: nb_pm_tasks
title: 任务
titleField: title
fields:
  - name: task_no
    interface: input
    title: 任务编号
    required: true
  - name: title
    interface: input
    title: 任务标题
    required: true
  - name: project
    interface: m2o
    title: 所属项目
    target: nb_pm_projects
    required: true
  - name: assignee
    interface: input
    title: 执行人
  - name: planned_hours
    interface: number
    title: 计划工时
    default: 0
  - name: actual_hours
    interface: number
    title: 实际工时
    default: 0
  - name: start_date
    interface: dateOnly
    title: 开始日期
  - name: due_date
    interface: dateOnly
    title: 截止日期
  - name: priority
    interface: select
    title: 优先级
    default: medium
    options:
      - value: low
        label: 低
      - value: medium
        label: 中
      - value: high
        label: 高
      - value: urgent
        label: 紧急
  - name: status
    interface: select
    title: 任务状态
    default: todo
    options:
      - value: todo
        label: 待开始
      - value: in_progress
        label: 进行中
      - value: review
        label: 待验收
      - value: done
        label: 已完成
      - value: blocked
        label: 已阻塞
  - name: description
    interface: textarea
    title: 任务描述
