name: nb_pm_members
title: 项目成员
titleField: name
fields:
  - name: employee_no
    interface: input
    title: 成员编号
    required: true
  - name: name
    interface: input
    title: 姓名
    required: true
  - name: role_name
    interface: input
    title: 岗位角色
  - name: department
    interface: input
    title: 所属部门
  - name: email
    interface: email
    title: 邮箱
  - name: phone
    interface: input
    title: 手机号
  - name: status
    interface: select
    title: 成员状态
    default: active
    options:
      - value: active
        label: 在岗
      - value: busy
        label: 忙碌
      - value: leave
        label: 请假
      - value: inactive
        label: 停用
  - name: joined_at
    interface: dateOnly
    title: 加入日期
  - name: notes
    interface: textarea
    title: 备注
