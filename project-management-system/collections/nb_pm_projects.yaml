name: nb_pm_projects
title: 项目
titleField: name
fields:
  - name: code
    interface: input
    title: 项目编号
    required: true
  - name: name
    interface: input
    title: 项目名称
    required: true
  - name: owner
    interface: input
    title: 项目负责人
  - name: client_name
    interface: input
    title: 客户名称
  - name: start_date
    interface: dateOnly
    title: 开始日期
  - name: end_date
    interface: dateOnly
    title: 结束日期
  - name: budget
    interface: number
    title: 项目预算
    default: 0
  - name: progress
    interface: integer
    title: 进度(%)
    default: 0
  - name: priority
    interface: select
    title: 优先级
    default: medium
    options:
      - value: low
        label: 低
      - value: medium
        label: 中
      - value: high
        label: 高
      - value: critical
        label: 紧急
  - name: status
    interface: select
    title: 项目状态
    default: planning
    options:
      - value: planning
        label: 规划中
      - value: active
        label: 进行中
      - value: on_hold
        label: 已暂停
      - value: completed
        label: 已完成
      - value: closed
        label: 已关闭
  - name: description
    interface: textarea
    title: 项目说明
