name: nb_pm_time_entries
title: 工时记录
titleField: entry_no
fields:
  - name: entry_no
    interface: input
    title: 工时单号
    required: true
  - name: project
    interface: m2o
    title: 所属项目
    target: nb_pm_projects
    required: true
  - name: task
    interface: m2o
    title: 关联任务
    target: nb_pm_tasks
  - name: member_name
    interface: input
    title: 填报人
    required: true
  - name: work_date
    interface: dateOnly
    title: 工作日期
    required: true
  - name: hours
    interface: number
    title: 工时
    default: 0
  - name: billable
    interface: select
    title: 是否计费
    default: 'yes'
    options:
      - value: 'yes'
        label: 是
      - value: 'no'
        label: 否
  - name: status
    interface: select
    title: 审批状态
    default: draft
    options:
      - value: draft
        label: 草稿
      - value: submitted
        label: 已提交
      - value: approved
        label: 已批准
      - value: rejected
        label: 已驳回
  - name: summary
    interface: textarea
    title: 工作内容
