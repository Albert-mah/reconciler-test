# ═══════════════════════════════════
#  CRM 复刻：增强
# ═══════════════════════════════════

popups:
  # ── Leads：新建 + 编辑（auto 派生） ──
  - target: $leads复刻.table.actions.addNew
    auto: [edit]
    coll: nb_crm_leads
    blocks:
      - key: form
        type: createForm
        resource: { binding: currentCollection }
        fields: [name, company, source, status, industry, owner, email, phone, mobile_phone]
        field_layout:
          - "--- 基本信息 ---"
          - [name, company]
          - [source, status, industry]
          - "--- 负责人 ---"
          - [owner]
          - "--- 联系方式 ---"
          - [email, phone, mobile_phone]
        actions: [submit]

  # ── Leads：详情弹窗（绑到 name 字段点击） ──
  - target: $leads复刻.table.fields.name
    coll: nb_crm_leads
    blocks:
      # 主要信息
      - key: detail_main
        type: details
        resource: { binding: currentRecord }
        fields: [company, title, owner, createdAt]
        field_layout:
          - [company, title]
          - [owner, createdAt]
        recordActions: [edit]

      # 公司信息
      - key: detail_company
        type: details
        resource: { binding: currentRecord }
        fields: [industry, annual_revenue, number_of_employees, company]
        field_layout:
          - "--- 公司信息 ---"
          - [industry, annual_revenue]
          - [number_of_employees, company]

      # 联系方式
      - key: detail_contact
        type: details
        resource: { binding: currentRecord }
        fields: [email, phone, mobile_phone, website, address]
        field_layout:
          - "--- 联系方式 ---"
          - [email, phone, mobile_phone]
          - [website, address]

js:
  # ── 筛选表单 JS 统计按钮 ──
  - target: $leads复刻.filter.fields.js_stats
    file: ./js/leads_filter_stats.js

  # ── 表格 JS 自定义列 ──
  - target: $leads复刻.table.fields.js_lead_name
    file: ./js/table_b3f6e3_col_Lead_Name_Company.js
    title: Lead Name/Company

  - target: $leads复刻.table.fields.js_contact
    file: ./js/table_b3f6e3_col_Contact.js
    title: Contact

  - target: $leads复刻.table.fields.js_ai_score
    file: ./js/table_b3f6e3_col_AI_Score.js
    title: AI Score

  - target: $leads复刻.table.fields.js_created
    file: ./js/table_b3f6e3_col_Created.js
    title: Created

  # ── 仪表盘 JS 统计 ──
  - target: $仪表盘.js_stats1
    file: ./js/stats1.js
  - target: $仪表盘.js_stats2
    file: ./js/stats2.js
  - target: $仪表盘.js_stats3
    file: ./js/stats3.js
  - target: $仪表盘.js_stats4
    file: ./js/stats4.js

# ── 仪表盘 Chart 配置 ──
charts:
  - target: $仪表盘.chart_pipeline
    config_file: ./chart_hu4haj.json
  - target: $仪表盘.chart_funnel
    config_file: ./chart_efd8l3.json
  - target: $仪表盘.chart_orders
    config_file: ./chart_fado2j.json
  - target: $仪表盘.chart_customers
    config_file: ./chart_dvigfl.json
  - target: $仪表盘.chart_industry
    config_file: ./chart_iay7yv.json
