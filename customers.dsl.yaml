    - uid: 5ebbc5a7f21
      use: JSColumn
      stepParams:
        tableColumnSettings:
          title:
            title: Health Score
          width:
            width: 150
        jsSettings:
          runJs:
            version: v1
            code: "/**\n * Health Score Column\n *\n * Displays AI health score with\
              \ Antd Progress circle.\n * Score ranges:\n * - >= 80: Green (Healthy)\n\
              \ * - >= 50: Yellow (Warning)\n * - < 50: Red (Critical)\n *\n * Table:\
              \ nb_crm_customers\n * Field: ai_health_score (integer 0-100)\n */\n\
              \nconst { Progress, Space, Tag, Tooltip } = ctx.antd;\n\n// Theme detection\n\
              const algorithm = ctx.antdConfig?.theme?.algorithm;\nconst darkAlgo\
              \ = ctx.antd.theme.darkAlgorithm;\nconst isDark = Array.isArray(algorithm)\n\
              \  ? algorithm.some(fn => fn === darkAlgo)\n  : algorithm === darkAlgo;\n\
              const T = ctx.themeToken || {};\n\n// i18n\nconst t = (key, opts) =>\
              \ ctx.t(key, { ns: 'nb_crm', ...opts });\n\n// ====================\
              \ Config ====================\nfunction getScoreConfig(score) {\n  if\
              \ (score >= 80) return { status: 'success', label: t('Healthy') };\n\
              \  if (score >= 50) return { status: 'normal', label: t('Warning'),\
              \ strokeColor: T.colorWarning || '#faad14' };\n  return { status: 'exception',\
              \ label: t('Critical') };\n}\n\n// ==================== Component ====================\n\
              function HealthScoreColumn() {\n  const record = ctx.record || {};\n\
              \  const score = typeof record.ai_health_score === 'number' ? record.ai_health_score\
              \ : 0;\n  const config = getScoreConfig(score);\n\n  const tooltipContent\
              \ = `${config.label} - AI Health Score: ${score}`;\n\n  return (\n \
              \   <Tooltip title={tooltipContent}>\n      <Space size={8}>\n     \
              \   <Progress\n          type=\"circle\"\n          percent={score}\n\
              \          width={40}\n          status={config.status}\n          strokeColor={config.strokeColor}\n\
              \          format={(percent) => `${percent}`}\n        />\n        <Tag\n\
              \          color=\"cyan\"\n          style={{\n            fontSize:\
              \ 10,\n            padding: '0 4px',\n            lineHeight: '16px',\n\
              \            background: 'linear-gradient(135deg, rgba(16, 185, 129,\
              \ 0.15), rgba(6, 182, 212, 0.15))',\n            border: 'none',\n \
              \         }}\n        >{t('AI')}</Tag>\n      </Space>\n    </Tooltip>\n\
              \  );\n}\n\nctx.render(<HealthScoreColumn />);\n"
