    - uid: 460109ddc84
      use: AIEmployeeButton
      stepParams:
        shortcutSettings:
          editTasks:
            tasks:
            - message:
                workContext:
                - type: flow-model
                  uid: d8498eb45ca
                  title: "\n    Table:\n    Customers"
                skillSettings: {}
                user: Give me an overview of my customer base.
                system: "Please begin an immediate and comprehensive visual analysis\
                  \ of our **Customers data**.\n\n**Guiding Principles & Tool Selection:**\n\
                  \n* **Primary Tool:** For this task, your first choice should be\
                  \ the **`Overall Analytics`** tool, as it is optimized for Customers\
                  \ data.\n* **Fallback Tool:** If you require data beyond the scope\
                  \ of `Overall Analytics`, use the **`SQL` tool** to query the database\
                  \ directly.\n\n**Analysis Workflow & Instructions:**\n\n1.  **Prerequisite:\
                  \ Verify Table Name**\n    * The database table for \"Customers\"\
                  \ is `nb_crm_customers`. Use this exact name when calling tools.\n\
                  \n2.  **Initial Analysis & Visualization**\n    * Perform a broad\
                  \ analysis of the customers data focusing on:\n      - Customer\
                  \ distribution by industry, type, and tier level\n      - Health\
                  \ score distribution across the customer base\n      - Churn risk\
                  \ analysis (at-risk customers)\n      - Revenue concentration (top\
                  \ customers vs long tail)\n      - Customer growth trends over time\n\
                  \    * Create a separate, clear ECharts visual (`<echarts>{...JSON...}</echarts>`)\
                  \ for each significant finding.\n\n3.  **Deep-Dive & User Guidance**\n\
                  \    * After presenting your initial findings, guide me toward deeper\
                  \ insights.\n    * **Formulate and ask me specific business questions**\
                  \ such as:\n        * *\"Your top 5 customers represent 40% of revenue.\
                  \ Would you like me to analyze the engagement levels and health\
                  \ scores of these key accounts?\"*\n        * *\"I see 12 customers\
                  \ flagged as 'at-risk'. Would you like a detailed breakdown of why\
                  \ they're at risk and recommended actions?\"*\n        * *\"The\
                  \ Healthcare industry shows the fastest customer growth. Would you\
                  \ like to compare profitability across industries?\"*\n\nPlease\
                  \ start the analysis now."
              title: Customers Analysis
              autoSend: true
            - message:
                workContext: []
                skillSettings: {}
                user: Analyze my contact coverage and quality.
                system: "Please begin an immediate and comprehensive visual analysis\
                  \ of our **Contacts data**.\n\n**Guiding Principles & Tool Selection:**\n\
                  \n* **Primary Tool:** For this task, your first choice should be\
                  \ the **`Overall Analytics`** tool, as it is optimized for Contacts\
                  \ data.\n* **Fallback Tool:** If you require data beyond the scope\
                  \ of `Overall Analytics`, use the **`SQL` tool** to query the database\
                  \ directly.\n\n**Analysis Workflow & Instructions:**\n\n1.  **Prerequisite:\
                  \ Verify Table Name**\n    * The database table for \"Contacts\"\
                  \ is `nb_crm_contacts`. Use this exact name when calling tools.\n\
                  \n2.  **Initial Analysis & Visualization**\n    * Perform a broad\
                  \ analysis of the contacts data focusing on:\n      - Contact coverage\
                  \ per customer (how many contacts per account?)\n      - Role/title\
                  \ distribution (decision makers, influencers, users)\n      - Primary\
                  \ contact designation coverage\n      - Contact data quality (email/phone\
                  \ availability rates)\n      - Department distribution across contacts\n\
                  \    * Create a separate, clear ECharts visual (`<echarts>{...JSON...}</echarts>`)\
                  \ for each significant finding.\n\n3.  **Deep-Dive & User Guidance**\n\
                  \    * After presenting your initial findings, guide me toward deeper\
                  \ insights.\n    * **Formulate and ask me specific business questions**\
                  \ such as:\n        * *\"I notice 15 key accounts have only 1 contact\
                  \ each - this is a risk. Would you like to see which accounts need\
                  \ multi-threading?\"*\n        * *\"Only 60% of contacts have both\
                  \ email and phone. Would you like to identify which contacts need\
                  \ data enrichment?\"*\n        * *\"We have few C-level contacts\
                  \ in manufacturing accounts. Would you like to analyze contact coverage\
                  \ by industry and seniority?\"*\n\nPlease start the analysis now."
              title: Contacts Analysis
              autoSend: true
