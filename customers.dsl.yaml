  - uid: e31595cfe5e
    use: FilterFormBlock
    grid:
      uid: e35bc668f2e
      use: FilterFormGrid
      items:
      - uid: 012bee0acfb
        use: JSItem
        stepParams:
          jsSettings:
            runJs:
              code: "/**\n * Customer Stats Filter Block\n * Supports URL params:\
                \ ?industry=xxx\n */\n\nconst TARGET_BLOCK_UID = 'd8498eb45ca';\n\n\
                const { useState, useEffect } = ctx.React;\nconst { Button, Badge,\
                \ Space, Spin, Divider } = ctx.antd;\n\nconst t = function(key, opts)\
                \ { return ctx.t(key, Object.assign({ ns: 'nb_crm' }, opts)); };\n\
                \n// ==================== URL Params ====================\nvar _search\
                \ = ctx.router?.state?.location?.search || '';\nvar _getParam = function(key)\
                \ {\n  var m = _search.match(new RegExp('[?&]' + key + '=([^&]*)'));\n\
                \  return m ? decodeURIComponent(m[1]) : null;\n};\nvar _urlIndustry\
                \ = _getParam('industry');\nvar _urlType = _getParam('type');\n\n\n\
                // ==================== Filter Config ====================\nvar now\
                \ = new Date();\nvar monthStart = new Date(now.getFullYear(), now.getMonth(),\
                \ 1).toISOString();\n\nvar STATS = [\n  // Status filters\n  { key:\
                \ 'all', label: 'All', filter: null, group: 'status' },\n  { key:\
                \ 'active', label: 'Active', filter: { status: { $eq: 'active' } },\
                \ group: 'status' },\n  { key: 'potential', label: 'Potential', filter:\
                \ { status: { $eq: 'potential' } }, group: 'status' },\n  { key: 'dormant',\
                \ label: 'Dormant', filter: { status: { $eq: 'dormant' } }, group:\
                \ 'status' },\n  { key: 'key_account', label: 'Key Accounts', filter:\
                \ { level: { $in: ['vip', 'important'] } }, group: 'status' },\n \
                \ // Smart filters\n  { key: 'new_month', label: 'New This Month',\
                \ filter: { createdAt: { $gte: monthStart } }, group: 'smart' },\n\
                ];\n\n// Add industry filters from URL\nif (_urlIndustry) {\n  STATS.push({\
                \ key: 'industry_' + _urlIndustry, label: _urlIndustry,\n    filter:\
                \ { industry: { $eq: _urlIndustry } }, group: 'industry' });\n}\n\n\
                \n\n// Determine initial key from URL\nvar INIT_KEY = 'all';\nif (_urlIndustry)\
                \ INIT_KEY = 'industry_' + _urlIndustry;\n\n// ====================\
                \ Data Hook ====================\nfunction useStats() {\n  var _useState\
                \ = useState({}), counts = _useState[0], setCounts = _useState[1];\n\
                \  var _useState2 = useState(true), loading = _useState2[0], setLoading\
                \ = _useState2[1];\n\n  useEffect(function() {\n    var fetchCounts\
                \ = function() {\n      var statusStats = STATS.filter(function(s)\
                \ { return s.group === 'status'; });\n      Promise.all(\n       \
                \ statusStats.map(function(s) {\n          return ctx.api.request({\n\
                \            url: 'nb_crm_customers:list',\n            params: {\
                \ pageSize: 1, ...(s.filter && { filter: JSON.stringify(s.filter)\
                \ }) },\n          });\n        })\n      ).then(function(results)\
                \ {\n        var c = {};\n        statusStats.forEach(function(s,\
                \ i) { c[s.key] = results[i]?.data?.meta?.count || 0; });\n      \
                \  setCounts(c);\n        setLoading(false);\n      }).catch(function(e)\
                \ { console.error('Stats fetch failed:', e); setLoading(false); });\n\
                \    };\n    fetchCounts();\n  }, []);\n\n  return { counts: counts,\
                \ loading: loading };\n}\n\n// ==================== Main Component\
                \ ====================\nvar StatsFilter = function() {\n  var stats\
                \ = useStats();\n  var counts = stats.counts, loading = stats.loading;\n\
                \  var _active = useState(INIT_KEY);\n  var active = _active[0], setActive\
                \ = _active[1];\n  var appliedRef = ctx.React.useRef(false);\n\n \
                \ var applyFilter = function(stat) {\n    var target = ctx.engine?.getModel(TARGET_BLOCK_UID);\n\
                \    if (!target) return;\n    target.resource.addFilterGroup(ctx.model.uid,\
                \ stat.filter || { $and: [] });\n    target.resource.refresh();\n\
                \  };\n\n  // Auto-apply from URL param\n  useEffect(function() {\n\
                \    if (!appliedRef.current && INIT_KEY !== 'all') {\n      appliedRef.current\
                \ = true;\n      var stat = STATS.find(function(s) { return s.key\
                \ === INIT_KEY; });\n      if (stat) setTimeout(function() { applyFilter(stat);\
                \ }, 500);\n    }\n  }, []);\n\n  var handleClick = function(stat)\
                \ {\n    setActive(stat.key);\n    applyFilter(stat);\n  };\n\n  if\
                \ (loading) return <Spin />;\n\n  var statusGroup = STATS.filter(function(s)\
                \ { return s.group === 'status'; });\n  var smartGroup = STATS.filter(function(s)\
                \ { return s.group !== 'status'; });\n\n  return (\n    <Space wrap\
                \ size={[8, 8]} split={smartGroup.length > 0 ? <Divider type=\"vertical\"\
                \ style={{ margin: 0 }} /> : null}>\n      <Space wrap size={[8, 8]}>\n\
                \        {statusGroup.map(function(s) {\n          return (\n    \
                \        <Button key={s.key} type={active === s.key ? 'primary' :\
                \ 'default'}\n              onClick={function() { handleClick(s);\
                \ }}>\n              {s.label}{counts[s.key] != null ? ' ' : ''}\n\
                \              {counts[s.key] != null && (\n                <Badge\
                \ count={counts[s.key]} showZero overflowCount={9999}\n          \
                \        style={{ marginLeft: 4,\n                    backgroundColor:\
                \ active === s.key ? '#fff' : '#f0f0f0',\n                    color:\
                \ active === s.key ? '#1677ff' : 'rgba(0,0,0,0.65)',\n           \
                \         boxShadow: 'none' }} />\n              )}\n            </Button>\n\
                \          );\n        })}\n      </Space>\n      {smartGroup.length\
                \ > 0 && (\n        <Space wrap size={[8, 8]}>\n          {smartGroup.map(function(s)\
                \ {\n            return (\n              <Button key={s.key} type={active\
                \ === s.key ? 'primary' : 'default'}\n                style={active\
                \ !== s.key ? { borderStyle: 'dashed' } : {}}\n                onClick={function()\
                \ { handleClick(s); }}>\n                {s.label}\n             \
                \ </Button>\n            );\n          })}\n        </Space>\n   \
                \   )}\n    </Space>\n  );\n};\n\nctx.render(<StatsFilter />);\n"
              version: v1
