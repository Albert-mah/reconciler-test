    - uid: 084e3b50100
      use: JSColumn
      stepParams:
        tableColumnSettings:
          title:
            title: Last Activity
        jsSettings:
          runJs:
            version: v1
            code: "/**\n * Last Activity Column - Leads Module\n * Shows relative\
              \ time since last activity with color indicator\n *\n * Table: nb_crm_leads\n\
              \ * Field: last_activity_at or updatedAt\n */\n\nconst record = ctx.record;\n\
              const activityDate = record?.last_activity_at || record?.updatedAt;\n\
              \n// Theme detection\nconst algorithm = ctx.antdConfig?.theme?.algorithm;\n\
              const darkAlgo = ctx.antd.theme.darkAlgorithm;\nconst isDark = Array.isArray(algorithm)\n\
              \  ? algorithm.some(fn => fn === darkAlgo)\n  : algorithm === darkAlgo;\n\
              const T = ctx.themeToken || {};\n\n// i18n\nconst t = (key, opts) =>\
              \ ctx.t(key, { ns: 'nb_crm.leads', ...opts });\n\n// Format relative\
              \ date helper\nconst formatRelativeDate = (dateStr) => {\n  if (!dateStr)\
              \ return { text: '-', color: T.colorTextTertiary || '#bfbfbf' };\n\n\
              \  const date = new Date(dateStr);\n  const now = new Date();\n  const\
              \ diffMs = now - date;\n  const diffMins = Math.floor(diffMs / 60000);\n\
              \  const diffHours = Math.floor(diffMs / 3600000);\n  const diffDays\
              \ = Math.floor(diffMs / 86400000);\n\n  let text, color;\n\n  if (diffMins\
              \ < 60) {\n    text = diffMins <= 1 ? 'Just now' : t('{{count}}m ago',\
              \ { count: diffMins });\n    color = T.colorSuccess || '#52c41a'; //\
              \ Green - very recent\n  } else if (diffHours < 24) {\n    text = t('{{count}}h\
              \ ago', { count: diffHours });\n    color = T.colorSuccess || '#52c41a';\
              \ // Green - today\n  } else if (diffDays === 1) {\n    text = 'Yesterday';\n\
              \    color = T.colorPrimary || '#1890ff'; // Blue - yesterday\n  } else\
              \ if (diffDays < 7) {\n    text = t('{{count}}d ago', { count: diffDays\
              \ });\n    color = T.colorPrimary || '#1890ff'; // Blue - this week\n\
              \  } else if (diffDays < 30) {\n    const weeks = Math.floor(diffDays\
              \ / 7);\n    text = t('{{count}}w ago', { count: weeks });\n    color\
              \ = T.colorWarning || '#faad14'; // Orange - weeks ago\n  } else if\
              \ (diffDays < 365) {\n    const months = Math.floor(diffDays / 30);\n\
              \    text = t('{{count}}mo ago', { count: months });\n    color = T.colorError\
              \ || '#ff4d4f'; // Red - months ago\n  } else {\n    const years = Math.floor(diffDays\
              \ / 365);\n    text = t('{{years}}y ago', { years: years });\n    color\
              \ = T.colorError || '#ff4d4f'; // Red - years ago\n  }\n\n  return {\
              \ text, color };\n};\n\nconst { text, color } = formatRelativeDate(activityDate);\n\
              \nctx.render(\n  <span style={{ fontSize: '13px', whiteSpace: 'nowrap'\
              \ }}>\n    <span style={{ color: color, marginRight: '4px' }}>●</span>\n\
              \    <span style={{ color: T.colorTextSecondary || '#595959' }}>{text}</span>\n\
              \  </span>\n);\n"
