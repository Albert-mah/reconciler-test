  - uid: 67558b719dd
    use: JSBlock
    stepParams:
      jsSettings:
        runJs:
          version: v1
          code: "/**\n * Category Tree Filter - Product Category Sidebar\n *\n * Tree\
            \ filter to filter product list by category hierarchy.\n *\n * Features:\n\
            \ * - Expandable/collapsible tree structure\n * - Shows product count\
            \ per category (including children)\n * - Click to filter product list\
            \ by category\n * - Search categories by name\n * - \"All Products\" option\
            \ to clear filter\n *\n * Tables: nb_crm_product_categories, nb_crm_products\n\
            \ */\n\n// ==================== Config ====================\nconst TARGET_BLOCK_UID\
            \ = '121ad8f2da1';  // TODO: Replace with actual product list block UID\n\
            const TABLE_NAME = 'nb_crm_product_categories';\nconst PRODUCT_TABLE =\
            \ 'nb_crm_products';\n\n// ==================== Setup ====================\n\
            const { useState, useEffect, useMemo, useCallback } = ctx.React;\nconst\
            \ { Card, Spin, Tree, Input, Badge, Typography, Space } = ctx.antd;\n\
            const { Search } = Input;\nconst { Text } = Typography;\n\n// Theme detection\n\
            const algorithm = ctx.antdConfig?.theme?.algorithm;\nconst darkAlgo =\
            \ ctx.antd.theme.darkAlgorithm;\nconst isDark = Array.isArray(algorithm)\n\
            \  ? algorithm.some(fn => fn === darkAlgo)\n  : algorithm === darkAlgo;\n\
            const T = ctx.themeToken || {};\n\n// i18n\nconst t = (key, opts) => ctx.t(key,\
            \ { ns: 'nb_crm', ...opts });\n\n// ==================== Styles ====================\n\
            const styles = {\n  card: {\n    borderRadius: 12,\n  },\n  cardBody:\
            \ {\n    padding: 0,\n  },\n  searchBox: {\n    padding: '12px 16px 8px',\n\
            \  },\n  treeContainer: {\n    padding: '0 8px 12px',\n    maxHeight:\
            \ 400,\n    overflowY: 'auto',\n  },\n  loadingContainer: {\n    display:\
            \ 'flex',\n    justifyContent: 'center',\n    padding: 40,\n  },\n  nodeTitle:\
            \ {\n    width: '100%',\n    justifyContent: 'space-between',\n  },\n\
            };\n\n// ==================== Hooks ====================\nfunction useCategoryData()\
            \ {\n  const [categories, setCategories] = useState([]);\n  const [productCounts,\
            \ setProductCounts] = useState({});\n  const [totalCount, setTotalCount]\
            \ = useState(0);\n  const [loading, setLoading] = useState(true);\n\n\
            \  useEffect(() => {\n    const fetchData = async () => {\n      try {\n\
            \        // Fetch categories with tree structure\n        const categoryRes\
            \ = await ctx.api.request({\n          url: `${TABLE_NAME}:list`,\n  \
            \        params: { tree: true, pageSize: 500, sort: ['sort_order'] },\n\
            \        });\n        const categoryData = categoryRes?.data?.data ||\
            \ [];\n\n        // Fetch total product count\n        const productRes\
            \ = await ctx.api.request({\n          url: `${PRODUCT_TABLE}:list`,\n\
            \          params: { pageSize: 1, appends: ['category'] },\n        });\n\
            \        const total = productRes?.data?.meta?.count || 0;\n        setTotalCount(total);\n\
            \n        // Get counts per category\n        const countRes = await ctx.api.request({\n\
            \          url: `${PRODUCT_TABLE}:list`,\n          params: { pageSize:\
            \ 9999, fields: ['id', 'category_id'] },\n        });\n        const products\
            \ = countRes?.data?.data || [];\n        const counts = {};\n\n      \
            \  products.forEach(product => {\n          const catId = product.category_id;\n\
            \          if (catId) {\n            counts[catId] = (counts[catId] ||\
            \ 0) + 1;\n          }\n        });\n\n        // Calculate parent category\
            \ counts (sum of children)\n        const calculateParentCounts = (cats)\
            \ => {\n          cats.forEach(cat => {\n            if (cat.children\
            \ && cat.children.length > 0) {\n              calculateParentCounts(cat.children);\n\
            \              const childSum = cat.children.reduce((sum, child) => {\n\
            \                return sum + (counts[child.id] || 0);\n             \
            \ }, 0);\n              counts[cat.id] = (counts[cat.id] || 0) + childSum;\n\
            \            }\n          });\n        };\n\n        calculateParentCounts(categoryData);\n\
            \        setProductCounts(counts);\n        setCategories(categoryData);\n\
            \      } catch (err) {\n        console.error('Category fetch error:',\
            \ err);\n        setCategories([]);\n      } finally {\n        setLoading(false);\n\
            \      }\n    };\n\n    fetchData();\n  }, []);\n\n  return { categories,\
            \ productCounts, totalCount, loading };\n}\n\n// ====================\
            \ Helper Functions ====================\nfunction flattenCategories(categories,\
            \ result = []) {\n  categories.forEach(cat => {\n    result.push(cat);\n\
            \    if (cat.children) {\n      flattenCategories(cat.children, result);\n\
            \    }\n  });\n  return result;\n}\n\nfunction getAllChildIds(categories,\
            \ parentId) {\n  const ids = [parentId];\n  const findChildren = (cats)\
            \ => {\n    cats.forEach(cat => {\n      if (cat.parentId === parentId\
            \ || ids.includes(cat.parentId)) {\n        ids.push(cat.id);\n      }\n\
            \      if (cat.children) {\n        findChildren(cat.children);\n    \
            \  }\n    });\n  };\n  findChildren(categories);\n  return ids;\n}\n\n\
            function convertToTreeData(categories, productCounts, searchValue) {\n\
            \  const filterBySearch = (cats, text) => {\n    if (!text) return cats;\n\
            \    const lowerText = text.toLowerCase();\n\n    return cats.reduce((acc,\
            \ cat) => {\n      const matchesName = cat.name?.toLowerCase().includes(lowerText);\n\
            \      const filteredChildren = cat.children ? filterBySearch(cat.children,\
            \ text) : [];\n\n      if (matchesName || filteredChildren.length > 0)\
            \ {\n        acc.push({\n          ...cat,\n          children: filteredChildren.length\
            \ > 0 ? filteredChildren : cat.children,\n        });\n      }\n     \
            \ return acc;\n    }, []);\n  };\n\n  const filteredCategories = filterBySearch(categories,\
            \ searchValue);\n\n  const mapToTreeNode = (cat) => ({\n    key: cat.id,\n\
            \    title: (\n      <Space style={styles.nodeTitle}>\n        <Text>{cat.name}</Text>\n\
            \        <Badge count={productCounts[cat.id] || 0} showZero color={T.colorBorderSecondary\
            \ || '#d9d9d9'} style={{ color: T.colorTextSecondary || '#666' }} />\n\
            \      </Space>\n    ),\n    children: cat.children?.map(mapToTreeNode),\n\
            \  });\n\n  return filteredCategories.map(mapToTreeNode);\n}\n\n// ====================\
            \ Components ====================\nconst CategoryTreeFilter = () => {\n\
            \  const { categories, productCounts, totalCount, loading } = useCategoryData();\n\
            \  const [selectedKeys, setSelectedKeys] = useState([]);\n  const [expandedKeys,\
            \ setExpandedKeys] = useState([]);\n  const [searchValue, setSearchValue]\
            \ = useState('');\n\n  const flatCategories = useMemo(() => flattenCategories(categories),\
            \ [categories]);\n\n  // Auto-expand first level on load\n  useEffect(()\
            \ => {\n    if (categories.length > 0 && expandedKeys.length === 0) {\n\
            \      setExpandedKeys(categories.map(c => c.id));\n    }\n  }, [categories]);\n\
            \n  const treeData = useMemo(\n    () => convertToTreeData(categories,\
            \ productCounts, searchValue),\n    [categories, productCounts, searchValue]\n\
            \  );\n\n  const applyFilter = useCallback(async (categoryIds) => {\n\
            \    try {\n      const targetModel = ctx.engine?.getModel(TARGET_BLOCK_UID);\n\
            \      if (!targetModel) {\n        console.warn('Target block not found:',\
            \ TARGET_BLOCK_UID);\n        return;\n      }\n\n      if (categoryIds\
            \ === null || categoryIds.length === 0) {\n        targetModel.resource.addFilterGroup(ctx.model.uid,\
            \ { $and: [] });\n      } else {\n        targetModel.resource.addFilterGroup(ctx.model.uid,\
            \ {\n          category_id: { $in: categoryIds },\n        });\n     \
            \ }\n\n      await targetModel.resource.refresh();\n    } catch (error)\
            \ {\n      console.error('Filter failed:', error);\n    }\n  }, []);\n\
            \n  const handleSelect = useCallback((keys) => {\n    if (keys.length\
            \ === 0 || (selectedKeys.length > 0 && keys[0] === selectedKeys[0])) {\n\
            \      setSelectedKeys([]);\n      applyFilter(null);\n    } else {\n\
            \      const categoryId = keys[0];\n      setSelectedKeys(keys);\n   \
            \   const allIds = getAllChildIds(flatCategories, categoryId);\n     \
            \ applyFilter([...new Set(allIds)]);\n    }\n  }, [selectedKeys, flatCategories,\
            \ applyFilter]);\n\n  const handleSelectAll = useCallback(() => {\n  \
            \  setSelectedKeys([]);\n    applyFilter(null);\n  }, [applyFilter]);\n\
            \n  const allProductsNode = {\n    key: '__all__',\n    title: (\n   \
            \   <Space style={styles.nodeTitle}>\n        <Text strong>{t('All Products')}</Text>\n\
            \        <Badge count={totalCount} showZero color={T.colorPrimary || '#1890ff'}\
            \ />\n      </Space>\n    ),\n  };\n\n  if (loading) {\n    return (\n\
            \      <Card style={styles.card}>\n        <div style={styles.loadingContainer}>\n\
            \          <Spin />\n        </div>\n      </Card>\n    );\n  }\n\n  return\
            \ (\n    <Card\n      title={t('Product Categories')}\n      size=\"small\"\
            \n      style={styles.card}\n      styles={{ body: styles.cardBody }}\n\
            \    >\n      <div style={styles.searchBox}>\n        <Search\n      \
            \    placeholder={t('Search categories')}\n          value={searchValue}\n\
            \          onChange={e => setSearchValue(e.target.value)}\n          allowClear\n\
            \          size=\"small\"\n        />\n      </div>\n\n      <div style={styles.treeContainer}>\n\
            \        <Tree\n          treeData={[allProductsNode, ...treeData]}\n\
            \          selectedKeys={selectedKeys.length === 0 ? ['__all__'] : selectedKeys}\n\
            \          expandedKeys={expandedKeys}\n          onSelect={(keys) =>\
            \ {\n            if (keys[0] === '__all__') {\n              handleSelectAll();\n\
            \            } else {\n              handleSelect(keys);\n           \
            \ }\n          }}\n          onExpand={setExpandedKeys}\n          blockNode\n\
            \        />\n      </div>\n    </Card>\n  );\n};\n\n// ====================\
            \ Main ====================\nctx.render(<CategoryTreeFilter />);\n"
  stepParams:
    gridSettings:
