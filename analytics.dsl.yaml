                \    }\n});"
  - uid: iay7yvf7pt5
    use: ChartBlock
    stepParams:
      chartSettings:
        configure:
          query:
            mode: sql
            sql: "SELECT\n    COALESCE(a.industry, 'Uncategorized') as industry_name,\n\
              \    COUNT(DISTINCT a.id) as customer_count,\n    COALESCE(SUM(o.order_amount),\
              \ 0) as total_revenue\nFROM nb_crm_customers a\nLEFT JOIN nb_crm_orders\
              \ o ON o.customer_id = a.id AND o.status = 'completed'\nWHERE (a.is_deleted\
              \ = false OR a.is_deleted IS NULL)\n  {% if ctx.var_form1.date_range.length\
              \ %}\n    AND a.\"createdAt\" >= {{ ctx.var_form1.date_range[0] }}::timestamp\n\
              \    AND a.\"createdAt\" < {{ ctx.var_form1.date_range[1] }}::timestamp\
              \ + INTERVAL '1 day'\n  {% endif %}\nGROUP BY a.industry\nORDER BY customer_count\
              \ DESC"
          chart:
            option:
              mode: custom
              raw: "const t = function(key, opts) { return ctx.t(key, Object.assign({\
                \ ns: 'nb_crm' }, opts)); };\n\nconst dateRange = ctx.var_form1?.date_range\
                \ || [];\nconst dateRangeText = dateRange.length === 2\n  ? ' - '\
                \ + dateRange[0] + ' to ' + dateRange[1]\n  : '';\n\nconst data =\
                \ ctx.data.objects || [];\n\nconst totalCustomers = data.reduce(function(sum,\
                \ item) { return sum + item.customer_count; }, 0);\nconst totalRevenue\
                \ = data.reduce(function(sum, item) { return sum + (item.total_revenue\
                \ || 0); }, 0);\n\nconst topN = 8;\nvar displayData;\nif (data.length\
                \ > topN) {\n  displayData = data.slice(0, topN);\n  var othersCount\
                \ = 0, othersRevenue = 0;\n  for (var i = topN; i < data.length; i++)\
                \ {\n    othersCount += data[i].customer_count;\n    othersRevenue\
                \ += (data[i].total_revenue || 0);\n  }\n  displayData.push({ industry_name:\
                \ t('Others'), customer_count: othersCount, total_revenue: othersRevenue\
                \ });\n} else {\n  displayData = data;\n}\n\nreturn {\n  dataset:\
                \ { source: displayData },\n  title: {\n    text: t('Customer Industry\
                \ Distribution') + dateRangeText,\n    subtext: t('Total') + ' ' +\
                \ totalCustomers + ' ' + t('Customers'),\n    left: 'center'\n  },\n\
                \  tooltip: {\n    trigger: 'item',\n    formatter: function(params)\
                \ {\n      var count = params.data.customer_count || 0;\n      var\
                \ revenue = (params.data.total_revenue || 0).toLocaleString();\n \
                \     var avgRevenue = count > 0 ? ((params.data.total_revenue ||\
                \ 0) / count).toFixed(0) : 0;\n      return params.name + '<br/>'\
                \ +\n             t('Customers') + ': ' + count + ' (' + params.percent\
                \ + '%)<br/>' +\n             t('Total Revenue') + ': ¥' + revenue\
                \ + '<br/>' +\n             t('Avg Revenue') + ': ¥' + avgRevenue;\n\
                \    }\n  },\n  legend: {\n    orient: 'vertical', left: 'left', top:\
                \ 'middle', type: 'scroll',\n    formatter: function(name) {\n   \
                \   for (var j = 0; j < displayData.length; j++) {\n        if (displayData[j].industry_name\
                \ === name) return name + ' (' + displayData[j].customer_count + ')';\n\
                \      }\n      return name;\n    }\n  },\n  graphic: [{\n    type:\
                \ 'group', left: 'center', top: 'middle',\n    children: [\n     \
                \ { type: 'text', style: { text: t('Total'), textAlign: 'center',\
                \ fill: '#666', fontSize: 14 }, top: -30 },\n      { type: 'text',\
                \ style: { text: '' + totalCustomers, textAlign: 'center', fill: '#5470c6',\
                \ fontSize: 32, fontWeight: 'bold' }, top: 0 },\n      { type: 'text',\
                \ style: { text: t('Customers'), textAlign: 'center', fill: '#666',\
                \ fontSize: 12 }, top: 35 }\n    ]\n  }],\n  series: [{\n    name:\
                \ t('Industry Distribution'), type: 'pie',\n    radius: ['40%', '70%'],\
                \ center: ['50%', '50%'],\n    avoidLabelOverlap: true,\n    itemStyle:\
                \ { borderRadius: 10, borderColor: '#fff', borderWidth: 2 },\n   \
                \ label: { show: false },\n    labelLine: { show: false },\n    emphasis:\
                \ {\n      label: { show: true, fontSize: 13, fontWeight: 'bold',\n\
                \        formatter: function(params) { return params.name + '\\n'\
                \ + params.data.customer_count + ' (' + params.percent + '%)'; } },\n\
                \      labelLine: { show: true, length: 10, length2: 8 },\n      itemStyle:\
                \ { shadowBlur: 10, shadowOffsetX: 0, shadowColor: 'rgba(0, 0, 0,\
                \ 0.5)' }\n    },\n    encode: { itemName: 'industry_name', value:\
                \ 'customer_count' }\n  }]\n}"
            events:
              mode: custom
              raw: "chart.off('click');\nchart.on('click', 'series', function(params)\
                \ {\n    const industry = params.name;\n    ctx.router.navigate('/admin/c137kk6hghm?industry='\
                \ + encodeURIComponent(industry));\n});"
