    stepParams:
      jsSettings:
        runJs:
          code: "const t = (key, opts) => ctx.t(key, { ns: 'nb_crm', ...opts });\n\
            const cardStyle = (color, bgColor) => ({\n  borderRadius: '0', padding:\
            \ '24px', position: 'relative', overflow: 'hidden',\n  border: 'none',\
            \ boxShadow: 'none',\n  margin: '-24px', height: 'calc(100% + 48px)',\
            \ width: 'calc(100% + 48px)',\n  display: 'flex', flexDirection: 'column',\
            \ cursor: 'pointer', overflow: 'hidden'\n});\nconst labelStyle = { fontSize:\
            \ '0.875rem', fontWeight: '500', zIndex: 2 };\nconst valueStyle = (color)\
            \ => ({ fontSize: '2rem', fontWeight: '700', marginTop: 'auto', zIndex:\
            \ 2, letterSpacing: '-0.03em', color });\nconst trendPillStyle = (color,\
            \ bgColor) => ({ fontSize: '0.75rem', padding: '2px 8px', borderRadius:\
            \ '99px', fontWeight: '600', background: bgColor, color });\nconst bgChartStyle\
            \ = { position: 'absolute', bottom: 0, right: 0, width: '140px', height:\
            \ '90px', zIndex: 1, opacity: 0.5, pointerEvents: 'none' };\n\nconst fmt\
            \ = (v) => v >= 1e6 ? `¥${(v/1e6).toFixed(1)}M` : v >= 1e3 ? `¥${(v/1e3).toFixed(1)}K`\
            \ : `¥${v.toFixed(0)}`;\nconst { useState, useEffect } = ctx.React;\n\
            const SQL_UID = 'kpi_total_revenue_v2';\n\nconst KpiCard = () => {\n \
            \ const [data, setData] = useState({ revenue: 0, growthRate: 0, loading:\
            \ true });\n  useEffect(() => { fetchData(); }, []);\n  const fetchData\
            \ = async () => {\n    try {\n      setData(prev => ({ ...prev, loading:\
            \ true }));\n      const { date_range } = ctx.form?.getFieldsValue?.()\
            \ || {};\n      const startDate = date_range?.[0] || ctx.libs.dayjs().startOf('month');\n\
            \      const endDate = date_range?.[1] || ctx.libs.dayjs().endOf('month');\n\
            \      const periodLength = endDate.diff(startDate, 'day');\n      const\
            \ previousStart = startDate.subtract(periodLength, 'day');\n      const\
            \ result = await ctx.sql.runById(SQL_UID, {\n        bind: { __var1: startDate.format('YYYY-MM-DD\
            \ 00:00:00'), __var2: endDate.format('YYYY-MM-DD 23:59:59'),\n       \
            \   __var3: previousStart.format('YYYY-MM-DD 00:00:00'), __var4: startDate.format('YYYY-MM-DD\
            \ 00:00:00') }, type: 'selectRows', dataSourceKey: 'main'\n      });\n\
            \      const record = result?.[0] || {};\n      setData({ revenue: parseFloat(record.current_revenue\
            \ || 0), growthRate: parseFloat(record.growth_rate || 0), loading: false\
            \ });\n    } catch (e) { console.error(e); setData(prev => ({ ...prev,\
            \ loading: false })); }\n  };\n\n  const handleClick = async () => {\n\
            \    const popupUid = ctx.model.uid + '-revenue-detail';\n    await ctx.openView(popupUid,\
            \ {\n      mode: 'dialog',\n      title: t('Total Revenue'),\n      size:\
            \ 'small',\n    });\n  };\n\n  return ctx.React.createElement('div', {\
            \ className: 'kpi-card-hover', style: cardStyle('#3b82f6', '#eff6ff'),\
            \ onClick: handleClick },\n    ctx.React.createElement('div', { style:\
            \ { display:'flex', justifyContent:'space-between', alignItems:'flex-start',\
            \ zIndex:2 } },\n      ctx.React.createElement('span', { style: labelStyle\
            \ }, t('Total Revenue')),\n      ctx.React.createElement('span', { style:\
            \ trendPillStyle('#3b82f6', '#eff6ff') }, data.growthRate >= 0 ? `+${data.growthRate.toFixed(1)}%`\
            \ : `${data.growthRate.toFixed(1)}%`)\n    ),\n    ctx.React.createElement('div',\
            \ { style: valueStyle('#3b82f6') }, data.loading ? '...' : fmt(data.revenue)),\n\
            \    ctx.React.createElement('svg', { style: bgChartStyle, viewBox:'0\
            \ 0 100 50', preserveAspectRatio:'none' },\n      ctx.React.createElement('path',\
            \ { d:'M0,50 L0,30 Q25,10 50,25 T100,15 L100,50 Z', fill:'#eff6ff', stroke:'#bfdbfe',\
            \ strokeWidth:'2' }))\n  );\n};\nctx.render(ctx.React.createElement(ctx.React.Fragment,\
            \ null, ctx.React.createElement('style', null, ':has(> .kpi-card-hover),:has(>\
            \ div > .kpi-card-hover){overflow:hidden!important}.kpi-card-hover{transition:transform\
            \ .2s ease;transform:scale(0.97)}.kpi-card-hover:hover{transform:scale(1)}'),\
            \ ctx.React.createElement(KpiCard, null)));\n"
          version: v1
