      - uid: xp880ob3lz8
        use: JSItem
        stepParams:
          jsSettings:
            runJs:
              code: "// CRM Dashboard - Filter and Reset Buttons\nconst { Button,\
                \ Space } = ctx.antd;\nconst { SearchOutlined, ReloadOutlined } =\
                \ ctx.libs.antdIcons;\nconst { useState } = ctx.React;\n\nconst FilterButtons\
                \ = () => {\n  const [filterLoading, setFilterLoading] = useState(false);\n\
                \  const [resetLoading, setResetLoading] = useState(false);\n\n  const\
                \ chartModelIds = [\n    'hu4haj59bjz',\n    'efd8l319buz',\n    'fado2jfs4bz',\n\
                \    'dvigfls2dy1',\n    'iay7yvf7pt5'\n  ];\n\n  const refreshAllCharts\
                \ = async () => {\n    const results = [];\n    for (const chartId\
                \ of chartModelIds) {\n      try {\n        const chartResource =\
                \ ctx.engine.getModel(chartId, true)?.resource;\n        if (chartResource)\
                \ {\n          await chartResource.refresh();\n          results.push({\
                \ id: chartId, success: true });\n        } else {\n          results.push({\
                \ id: chartId, success: false, error: 'Resource not found' });\n \
                \       }\n      } catch (error) {\n        results.push({ id: chartId,\
                \ success: false, error: error.message });\n      }\n    }\n    const\
                \ successCount = results.filter(r => r.success).length;\n    if (successCount\
                \ === chartModelIds.length) {\n      ctx.message.success(`Successfully\
                \ refreshed ${successCount} charts`);\n    } else if (successCount\
                \ > 0) {\n      ctx.message.warning(`Refreshed ${successCount}/${chartModelIds.length}\
                \ charts`);\n    } else {\n      ctx.message.error('Failed to refresh\
                \ charts');\n    }\n  };\n\n  const handleFilter = async () => {\n\
                \    setFilterLoading(true);\n    try {\n      await refreshAllCharts();\n\
                \    } catch (error) {\n      ctx.message.error('Filter failed: '\
                \ + error.message);\n    } finally {\n      setFilterLoading(false);\n\
                \    }\n  };\n\n  const handleReset = async () => {\n    setResetLoading(true);\n\
                \    try {\n      if (ctx.form?.resetFields) {\n        ctx.form.resetFields();\n\
                \      }\n      await new Promise(resolve => setTimeout(resolve, 100));\n\
                \      ctx.message.success('Filters reset successfully');\n      await\
                \ refreshAllCharts();\n    } catch (error) {\n      ctx.message.error('Reset\
                \ failed: ' + error.message);\n    } finally {\n      setResetLoading(false);\n\
                \    }\n  };\n\n  return (\n    <div style={{ width: '100%', display:\
                \ 'flex', justifyContent: 'center', alignItems: 'flex-end', paddingTop:\
                \ '20px' }}>\n      <Space size=\"middle\" wrap>\n        <Button\
                \ type=\"primary\" onClick={handleFilter} loading={filterLoading}\
                \ icon={<SearchOutlined />}>Filter</Button>\n        <Button onClick={handleReset}\
                \ loading={resetLoading} icon={<ReloadOutlined />}>Reset</Button>\n\
                \      </Space>\n    </div>\n  );\n};\n\nctx.render(<FilterButtons\
                \ />);\n"
              version: v1
