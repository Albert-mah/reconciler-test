  - uid: hu4haj59bjz
    use: ChartBlock
    hu4haj59bjz-opp-by-stage:
      uid: hu4haj59bjz-opp-by-stage
      use: PopupAction
    stepParams:
      chartSettings:
        configure:
          query:
            mode: sql
            sql: "SELECT\n    COALESCE(stage, 'Not Set') as stage_name,\n    COUNT(*)\
              \ as opportunity_count,\n    COALESCE(SUM(amount), 0) as total_amount,\n\
              \    ROUND(AVG(\n        CASE\n            WHEN stage = 'won' THEN 1.0\n\
              \            WHEN stage = 'lost' THEN 0\n            ELSE win_probability\n\
              \        END\n    )::numeric * 100, 2) as avg_probability,\n    COALESCE(SUM(\n\
              \        amount * (\n            CASE\n                WHEN stage =\
              \ 'won' THEN 1.0\n                WHEN stage = 'lost' THEN 0\n     \
              \           ELSE win_probability\n            END\n        )\n    ),\
              \ 0) as weighted_amount\nFROM nb_crm_opportunities\nWHERE 1=1\n  {%\
              \ if ctx.var_form1.owner_99b8gb9klj1.id %}\n    AND owner_id = {{ ctx.var_form1.owner_99b8gb9klj1.id\
              \ }}\n  {% endif %}\n  {% if ctx.var_form1.date_range.length %}\n  \
              \  AND \"createdAt\" >= {{ ctx.var_form1.date_range[0] }}::timestamp\n\
              \    AND \"createdAt\" < {{ ctx.var_form1.date_range[1] }}::timestamp\
              \ + INTERVAL '1 day'\n  {% endif %}\nGROUP BY stage\nORDER BY\n    CASE\
              \ stage\n        WHEN 'prospecting' THEN 1\n        WHEN 'analysis'\
              \ THEN 2\n        WHEN 'proposal' THEN 3\n        WHEN 'negotiation'\
              \ THEN 4\n        WHEN 'won' THEN 5\n        WHEN 'lost' THEN 6\n  \
              \      ELSE 7\n    END"
          chart:
            option:
              mode: custom
              raw: "const t = function(key, opts) { return ctx.t(key, Object.assign({\
                \ ns: 'nb_crm' }, opts)); };\n\nconst dateRange = ctx.var_form1?.date_range\
                \ || [];\nconst dateRangeText = dateRange.length === 2\n  ? dateRange[0]\
                \ + ' to ' + dateRange[1]\n  : t('All Time');\n\nreturn {\n  dataset:\
                \ { source: ctx.data.objects },\n  title: {\n    text: t('Opportunity\
                \ Stage Distribution') + ' - ' + dateRangeText,\n    subtext: t('Sorted\
                \ by Sales Funnel Sequence'),\n    left: 'center'\n  },\n  tooltip:\
                \ {\n    trigger: 'axis',\n    axisPointer: { type: 'shadow' },\n\
                \    formatter: function(params) {\n      var result = params[0].axisValue\
                \ + '<br/>';\n      params.forEach(function(item) {\n        if(item.seriesName\
                \ === t('Count')) {\n          result += item.marker + t('Count')\
                \ + ': ' + item.value.opportunity_count + '<br/>';\n        } else\
                \ if(item.seriesName === t('Avg Probability')) {\n          result\
                \ += item.marker + t('Avg Probability') + ': ' + item.value.avg_probability\
                \ + '%<br/>';\n        } else {\n          result += item.marker +\
                \ t('Total Amount') + ': ¥' + (item.value.total_amount || 0).toLocaleString()\
                \ + '<br/>';\n        }\n      });\n      result += t('Weighted Amount')\
                \ + ': ¥' + (params[0].value.weighted_amount || 0).toLocaleString();\n\
                \      return result;\n    }\n  },\n  legend: { data: [t('Count'),\
                \ t('Total Amount'), t('Avg Probability')], bottom: 0 },\n  grid:\
                \ { left: '3%', right: '4%', bottom: '60', top: '100', containLabel:\
                \ true },\n  xAxis: { type: 'category', axisLabel: { rotate: 30, interval:\
                \ 0, fontSize: 10 } },\n  yAxis: [\n    { type: 'value', name: t('Count')\
                \ + '/' + t('Amount'), position: 'left',\n      axisLabel: { formatter:\
                \ function(value) { return value >= 10000 ? (value/10000).toFixed(1)\
                \ + 'w' : value; } } },\n    { type: 'value', name: t('Probability')\
                \ + '(%)', position: 'right', max: 100 }\n  ],\n  series: [\n    {\
                \ name: t('Count'), type: 'bar', encode: { x: 'stage_name', y: 'opportunity_count'\
                \ },\n      itemStyle: { color: '#5470c6' }, label: { show: true,\
                \ position: 'top', fontSize: 9 } },\n    { name: t('Total Amount'),\
                \ type: 'bar', encode: { x: 'stage_name', y: 'total_amount' },\n \
                \     itemStyle: { color: '#91cc75' } },\n    { name: t('Avg Probability'),\
                \ type: 'line', yAxisIndex: 1,\n      encode: { x: 'stage_name', y:\
                \ 'avg_probability' },\n      itemStyle: { color: '#fac858' },\n \
                \     label: { show: true, position: 'top', formatter: function(params)\
                \ { return params.value.avg_probability + '%'; }, fontSize: 9 } }\n\
                \  ]\n}"
            events:
              mode: custom
              raw: "chart.off('click');\nchart.on('click', 'series', function(params)\
                \ {\n    const stage = params.name || params.axisValue;\n    const\
                \ popupUid = ctx.model.uid + '-opp-by-stage';\n    ctx.openView(popupUid,\
                \ {\n      mode: 'drawer',\n      title: 'Opportunities - ' + stage,\n\
                \      size: 'large',\n      defineProperties: {\n        selectedStage:\
                \ {\n          value: stage,\n          meta: {\n            title:\
                \ 'Selected Stage',\n            type: 'string',\n          },\n \
                \       },\n      },\n    });\n});"
  - uid: efd8l319buz
    use: ChartBlock
    stepParams:
      chartSettings:
        configure:
          query:
            mode: sql
            sql: "-- Sales Funnel: Lead -> Opportunity -> Quotation -> Order\nSELECT\
              \ '1-Lead' as stage, COUNT(*) as count, 0 as potential_value\nFROM nb_crm_leads\n\
              WHERE 1=1\n  {% if ctx.var_form1.owner_99b8gb9klj1.id %}\n    AND owner_id\
              \ = {{ ctx.var_form1.owner_99b8gb9klj1.id }}\n  {% endif %}\n  {% if\
              \ ctx.var_form1.date_range.length %}\n    AND \"createdAt\" >= {{ ctx.var_form1.date_range[0]\
              \ }}::timestamp\n    AND \"createdAt\" < {{ ctx.var_form1.date_range[1]\
              \ }}::timestamp + INTERVAL '1 day'\n  {% endif %}\n\nUNION ALL\n\nSELECT\
              \ '2-Opportunity' as stage, COUNT(*) as count, COALESCE(SUM(amount),\
              \ 0) as potential_value\nFROM nb_crm_opportunities\nWHERE 1=1\n  {%\
              \ if ctx.var_form1.owner_99b8gb9klj1.id %}\n    AND owner_id = {{ ctx.var_form1.owner_99b8gb9klj1.id\
              \ }}\n  {% endif %}\n  {% if ctx.var_form1.date_range.length %}\n  \
              \  AND \"createdAt\" >= {{ ctx.var_form1.date_range[0] }}::timestamp\n\
              \    AND \"createdAt\" < {{ ctx.var_form1.date_range[1] }}::timestamp\
              \ + INTERVAL '1 day'\n  {% endif %}\n\nUNION ALL\n\nSELECT '3-Quotation'\
              \ as stage, COUNT(*) as count, COALESCE(SUM(total_amount), 0) as potential_value\n\
              FROM nb_crm_quotations\nWHERE status != 'cancelled'\n  {% if ctx.var_form1.date_range.length\
              \ %}\n    AND \"createdAt\" >= {{ ctx.var_form1.date_range[0] }}::timestamp\n\
              \    AND \"createdAt\" < {{ ctx.var_form1.date_range[1] }}::timestamp\
              \ + INTERVAL '1 day'\n  {% endif %}\n\nUNION ALL\n\nSELECT '4-Order'\
              \ as stage, COUNT(*) as count, COALESCE(SUM(order_amount), 0) as potential_value\n\
              FROM nb_crm_orders\nWHERE 1=1\n  {% if ctx.var_form1.owner_99b8gb9klj1.id\
              \ %}\n    AND owner_id = {{ ctx.var_form1.owner_99b8gb9klj1.id }}\n\
              \  {% endif %}\n  {% if ctx.var_form1.status_filter.length > 0 %}\n\
              \    AND status = ANY({{ ctx.var_form1.status_filter }})\n  {% endif\
              \ %}\n  {% if ctx.var_form1.date_range.length %}\n    AND order_date\
              \ >= {{ ctx.var_form1.date_range[0] }}::timestamp\n    AND order_date\
              \ < {{ ctx.var_form1.date_range[1] }}::timestamp + INTERVAL '1 day'\n\
              \  {% endif %}\n\nORDER BY stage"
          chart:
            option:
              mode: custom
              raw: "const t = function(key, opts) { return ctx.t(key, Object.assign({\
                \ ns: 'nb_crm' }, opts)); };\n\nconst dateRange = ctx.var_form1?.date_range\
                \ || [];\nconst dateRangeText = dateRange.length === 2\n  ? dateRange[0]\
                \ + ' to ' + dateRange[1]\n  : t('All Time');\n\nconst data = ctx.data.objects\
                \ || [];\nconst conversionRates = [];\nfor (var i = 1; i < data.length;\
                \ i++) {\n  var rate = data[i-1].count > 0\n    ? ((data[i].count\
                \ / data[i-1].count) * 100).toFixed(1)\n    : 0;\n  conversionRates.push(rate);\n\
                }\n\nreturn {\n  dataset: { source: ctx.data.objects },\n  title:\
                \ {\n    text: t('Sales Funnel Analysis') + ' - ' + dateRangeText,\n\
                \    subtext: t('Complete conversion from leads to orders'),\n   \
                \ left: 'center'\n  },\n  tooltip: {\n    trigger: 'item',\n    formatter:\
                \ function(params) {\n      var idx = params.dataIndex;\n      var\
                \ result = params.name + '<br/>';\n      result += t('Count') + ':\
                \ ' + params.data.count + '<br/>';\n      result += t('Value') + ':\
                \ ¥' + (params.data.potential_value || 0).toLocaleString() + '<br/>';\n\
                \      if (idx > 0 && conversionRates[idx - 1]) {\n        result\
                \ += t('Conversion Rate') + ': ' + conversionRates[idx - 1] + '%';\n\
                \      } else if (idx === 0) {\n        result += '(' + t('Funnel\
                \ Top') + ')';\n      }\n      return result;\n    }\n  },\n  series:\
                \ [{\n    name: t('Sales Funnel'),\n    type: 'funnel',\n    left:\
                \ '10%', top: 100, bottom: 60, width: '80%',\n    min: 0, max: 100,\
                \ minSize: '20%', maxSize: '100%',\n    sort: 'descending', gap: 2,\n\
                \    label: {\n      show: true, position: 'inside',\n      formatter:\
                \ function(params) {\n        var idx = params.dataIndex;\n      \
                \  var text = params.name + '\\n' + params.data.count;\n        if\
                \ (idx > 0 && conversionRates[idx - 1]) {\n          text += '\\n▼\
                \ ' + conversionRates[idx - 1] + '%';\n        }\n        return text;\n\
                \      },\n      fontSize: 14, fontWeight: 'bold', color: '#333',\n\
                \      textBorderColor: '#fff', textBorderWidth: 2\n    },\n    itemStyle:\
                \ {\n      borderColor: '#fff', borderWidth: 2,\n      color: function(params)\
                \ {\n        var colors = ['#5470c6', '#91cc75', '#fac858', '#ee6666'];\n\
                \        return colors[params.dataIndex % colors.length];\n      },\n\
                \      opacity: 0.85\n    },\n    emphasis: {\n      label: { fontSize:\
                \ 18, fontWeight: 'bold', color: '#333', textBorderColor: '#fff',\
                \ textBorderWidth: 3 },\n      itemStyle: { opacity: 1 }\n    },\n\
                \    encode: { value: 'count', itemName: 'stage' }\n  }],\n  graphic:\
                \ [{\n    type: 'text', left: 'center', bottom: 20,\n    style: {\
                \ text: '▼ ' + t('indicates conversion rate from previous stage'),\
                \ fontSize: 12, fill: '#666' }\n  }]\n}"
            events:
              mode: custom
              raw: "chart.off('click');\nchart.on('click', 'series', function(params)\
                \ {\n    const stage = params.name;\n    let url = '';\n    switch(stage)\
                \ {\n        case '1-Lead': url = '/admin/e9478uhrdve'; break;\n \
                \       case '2-Opportunity': url = '/admin/vga8g2pgnnu'; break;\n\
                \        case '3-Quotation': url = '/admin/x9u01x7l8wj'; break;\n\
                \        case '4-Order': url = '/admin/x9u01x7l8wj'; break;\n    }\n\
                \    if(url) {\n        ctx.router.navigate(url + '?stage=' + encodeURIComponent(stage));\n\
                \    }\n});"
  - uid: fado2jfs4bz
    use: ChartBlock
    stepParams:
      chartSettings:
        configure:
          query:
            mode: sql
            sql: "SELECT\n    TO_CHAR(order_date, 'YYYY-MM') as month,\n    COUNT(*)\
              \ as order_count,\n    COALESCE(SUM(order_amount), 0) as monthly_revenue,\n\
              \    ROUND(AVG(order_amount)::numeric, 2) as avg_order_value\nFROM nb_crm_orders\n\
              WHERE order_date IS NOT NULL\n  {% if ctx.var_form1.owner_99b8gb9klj1.id\
              \ %}\n    AND owner_id = {{ ctx.var_form1.owner_99b8gb9klj1.id }}\n\
              \  {% endif %}\n  {% if ctx.var_form1.status_filter.length > 0 %}\n\
              \    AND status = ANY({{ ctx.var_form1.status_filter }})\n  {% endif\
              \ %}\n  {% if ctx.var_form1.date_range.length %}\n    AND order_date\
              \ >= {{ ctx.var_form1.date_range[0] }}::timestamp\n    AND order_date\
              \ < {{ ctx.var_form1.date_range[1] }}::timestamp + INTERVAL '1 day'\n\
              \  {% endif %}\nGROUP BY TO_CHAR(order_date, 'YYYY-MM')\nORDER BY month\
              \ ASC"
          chart:
            option:
              mode: custom
              raw: "const t = function(key, opts) { return ctx.t(key, Object.assign({\
                \ ns: 'nb_crm' }, opts)); };\n\nconst dateRange = ctx.var_form1?.date_range\
                \ || [];\nconst dateRangeText = dateRange.length === 2\n  ? dateRange[0]\
                \ + ' to ' + dateRange[1]\n  : t('All Time');\n\nconst data = ctx.data.objects;\n\
                \nconst growthRates = [];\nfor (var i = 1; i < data.length; i++) {\n\
                \  var prevRevenue = data[i-1].monthly_revenue || 0;\n  var currRevenue\
                \ = data[i].monthly_revenue || 0;\n  var rate = prevRevenue > 0\n\
                \    ? (((currRevenue - prevRevenue) / prevRevenue) * 100).toFixed(1)\n\
                \    : 0;\n  growthRates.push(rate);\n}\n\nreturn {\n  dataset: {\
                \ source: data },\n  title: {\n    text: t('Monthly Sales Trend')\
                \ + ' - ' + dateRangeText,\n    subtext: t('Revenue, Order Count,\
                \ and AOV Analysis'),\n    left: 'center'\n  },\n  tooltip: {\n  \
                \  trigger: 'axis',\n    axisPointer: { type: 'cross' },\n    formatter:\
                \ function(params) {\n      var result = params[0].axisValue + '<br/>';\n\
                \      params.forEach(function(item) {\n        if (item.seriesName\
                \ === t('Order Count')) {\n          result += item.marker + t('Order\
                \ Count') + ': ' + item.value.order_count + '<br/>';\n        } else\
                \ if (item.seriesName === t('Monthly Revenue')) {\n          result\
                \ += item.marker + t('Monthly Revenue') + ': ¥' + (item.value.monthly_revenue\
                \ || 0).toLocaleString() + '<br/>';\n        } else if (item.seriesName\
                \ === t('Avg Order Value')) {\n          result += item.marker + t('Avg\
                \ Order Value') + ': ¥' + (item.value.avg_order_value || 0).toLocaleString()\
                \ + '<br/>';\n        }\n      });\n      var idx = params[0].dataIndex;\n\
                \      if (idx > 0 && growthRates[idx - 1]) {\n        var r = growthRates[idx\
                \ - 1];\n        var arrow = r > 0 ? '↑' : r < 0 ? '↓' : '→';\n  \
                \      var color = r > 0 ? '#67C23A' : r < 0 ? '#F56C6C' : '#909399';\n\
                \        result += '<span style=\"color:' + color + '\">' + t('MoM')\
                \ + ': ' + arrow + ' ' + Math.abs(r) + '%</span>';\n      }\n    \
                \  return result;\n    }\n  },\n  legend: { data: [t('Monthly Revenue'),\
                \ t('Order Count'), t('Avg Order Value')], bottom: 0 },\n  grid: {\
                \ left: '3%', right: '4%', bottom: '80', top: '100', containLabel:\
                \ true },\n  dataZoom: [\n    { type: 'slider', show: data.length\
                \ > 12, xAxisIndex: [0],\n      start: Math.max(0, ((data.length -\
                \ 12) / data.length) * 100), end: 100, bottom: 40 },\n    { type:\
                \ 'inside', xAxisIndex: [0],\n      start: Math.max(0, ((data.length\
                \ - 12) / data.length) * 100), end: 100 }\n  ],\n  xAxis: { type:\
                \ 'category', boundaryGap: false, axisLabel: { rotate: 45, fontSize:\
                \ 10 } },\n  yAxis: [\n    { type: 'value', name: t('Amount') + '(¥)',\
                \ position: 'left',\n      axisLabel: { formatter: function(value)\
                \ { return value >= 10000 ? (value/10000).toFixed(1) + 'w' : value;\
                \ } } },\n    { type: 'value', name: t('Order Count'), position: 'right'\
                \ }\n  ],\n  series: [\n    { name: t('Monthly Revenue'), type: 'line',\
                \ smooth: true,\n      encode: { x: 'month', y: 'monthly_revenue'\
                \ },\n      itemStyle: { color: '#5470c6' }, lineStyle: { width: 3\
                \ }, emphasis: { focus: 'series' } },\n    { name: t('Order Count'),\
                \ type: 'bar', yAxisIndex: 1,\n      encode: { x: 'month', y: 'order_count'\
                \ },\n      itemStyle: { color: '#91cc75', opacity: 0.7 },\n     \
                \ label: { show: true, position: 'top', fontSize: 9 } },\n    { name:\
                \ t('Avg Order Value'), type: 'line',\n      encode: { x: 'month',\
                \ y: 'avg_order_value' },\n      itemStyle: { color: '#fac858' },\n\
                \      lineStyle: { type: 'dashed', width: 2 }, symbol: 'circle',\
                \ symbolSize: 6 }\n  ]\n}"
            events:
              mode: custom
              raw: "chart.off('click');\nchart.on('click', function(params) {\n  \
                \  var month = params.name || params.axisValue;\n    if (month) {\n\
                \        ctx.router.navigate('/admin/x9u01x7l8wj?month=' + encodeURIComponent(month));\n\
                \    }\n});"
  - uid: dvigfls2dy1
    use: ChartBlock
    stepParams:
      chartSettings:
        configure:
          query:
            mode: sql
            sql: "SELECT\n    TO_CHAR(\"createdAt\", 'YYYY-MM') as month,\n    COUNT(*)\
              \ as new_customers,\n    SUM(COUNT(*)) OVER (ORDER BY TO_CHAR(\"createdAt\"\
              , 'YYYY-MM')) as cumulative_customers\nFROM nb_crm_customers\nWHERE\
              \ \"createdAt\" IS NOT NULL\n  AND (is_deleted = false OR is_deleted\
              \ IS NULL)\n  {% if ctx.var_form1.date_range.length %}\n    AND \"createdAt\"\
              \ >= {{ ctx.var_form1.date_range[0] }}::timestamp\n    AND \"createdAt\"\
              \ < {{ ctx.var_form1.date_range[1] }}::timestamp + INTERVAL '1 day'\n\
              \  {% endif %}\nGROUP BY TO_CHAR(\"createdAt\", 'YYYY-MM')\nORDER BY\
              \ month ASC"
          chart:
            option:
              mode: custom
              raw: "const t = function(key, opts) { return ctx.t(key, Object.assign({\
                \ ns: 'nb_crm' }, opts)); };\n\nconst dateRange = ctx.var_form1?.date_range\
                \ || [];\nconst dateRangeText = dateRange.length === 2\n  ? dateRange[0]\
                \ + ' to ' + dateRange[1]\n  : t('All Time');\n\nconst data = ctx.data.objects;\n\
                \nconst growthRates = [];\nfor (var i = 1; i < data.length; i++) {\n\
                \  var prevCount = data[i-1].new_customers || 0;\n  var currCount\
                \ = data[i].new_customers || 0;\n  var rate = prevCount > 0\n    ?\
                \ (((currCount - prevCount) / prevCount) * 100).toFixed(1)\n    :\
                \ 0;\n  growthRates.push({ month: data[i].month, rate: rate });\n\
                }\n\nconst avgNewCustomers = data.length > 0\n  ? (data.reduce(function(sum,\
                \ item) { return sum + item.new_customers; }, 0) / data.length).toFixed(0)\n\
                \  : 0;\n\nreturn {\n  dataset: { source: data },\n  title: {\n  \
                \  text: t('Customer Growth Trend') + ' - ' + dateRangeText,\n   \
                \ subtext: t('Monthly Avg') + ': ' + avgNewCustomers + ' ' + t('customers'),\n\
                \    left: 'center'\n  },\n  tooltip: {\n    trigger: 'axis',\n  \
                \  axisPointer: { type: 'cross' },\n    formatter: function(params)\
                \ {\n      var result = params[0].axisValue + '<br/>';\n      params.forEach(function(item)\
                \ {\n        if (item.seriesName === t('New Customers')) {\n     \
                \     result += item.marker + t('New Customers') + ': ' + item.value.new_customers\
                \ + '<br/>';\n        } else if (item.seriesName === t('Cumulative'))\
                \ {\n          result += item.marker + t('Cumulative') + ': ' + item.value.cumulative_customers\
                \ + '<br/>';\n        }\n      });\n      var growthItem = null;\n\
                \      for (var j = 0; j < growthRates.length; j++) {\n        if\
                \ (growthRates[j].month === params[0].axisValue) { growthItem = growthRates[j];\
                \ break; }\n      }\n      if (growthItem) {\n        var rate = growthItem.rate;\n\
                \        var arrow = rate > 0 ? '↑' : rate < 0 ? '↓' : '→';\n    \
                \    var color = rate > 0 ? '#67C23A' : rate < 0 ? '#F56C6C' : '#909399';\n\
                \        result += '<span style=\"color:' + color + '\">' + t('MoM')\
                \ + ': ' + arrow + ' ' + Math.abs(rate) + '%</span>';\n      }\n \
                \     return result;\n    }\n  },\n  legend: { data: [t('New Customers'),\
                \ t('Cumulative')], bottom: 0 },\n  grid: { left: '3%', right: '4%',\
                \ bottom: '80', top: '100', containLabel: true },\n  dataZoom: [\n\
                \    { type: 'slider', show: data.length > 12, xAxisIndex: [0],\n\
                \      start: Math.max(0, ((data.length - 12) / data.length) * 100),\
                \ end: 100, bottom: 40 },\n    { type: 'inside', xAxisIndex: [0],\n\
                \      start: Math.max(0, ((data.length - 12) / data.length) * 100),\
                \ end: 100 }\n  ],\n  xAxis: { type: 'category', boundaryGap: false,\
                \ axisLabel: { rotate: 45, fontSize: 10 } },\n  yAxis: [\n    { type:\
                \ 'value', name: t('New Customers'), position: 'left' },\n    { type:\
                \ 'value', name: t('Cumulative'), position: 'right' }\n  ],\n  series:\
                \ [\n    { name: t('New Customers'), type: 'bar',\n      encode: {\
                \ x: 'month', y: 'new_customers' },\n      itemStyle: { color: '#5470c6'\
                \ },\n      label: { show: true, position: 'top', fontSize: 9 },\n\
                \      markLine: { silent: true, symbol: 'none',\n        label: {\
                \ position: 'end', formatter: t('Average') + ': ' + avgNewCustomers\
                \ },\n        data: [{ type: 'average', name: t('Average'),\n    \
                \      lineStyle: { color: '#5470c6', type: 'dashed', width: 2 } }]\
                \ } },\n    { name: t('Cumulative'), type: 'line', yAxisIndex: 1,\
                \ smooth: true,\n      encode: { x: 'month', y: 'cumulative_customers'\
                \ },\n      itemStyle: { color: '#91cc75' }, lineStyle: { width: 3\
                \ }, emphasis: { focus: 'series' } }\n  ]\n}"
            events:
