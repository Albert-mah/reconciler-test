    - uid: 7f1891a8535
      use: JSColumn
      stepParams:
        tableColumnSettings:
          title:
            title: AI Score
          width:
            width: 200
        jsSettings:
          runJs:
            version: v1
            code: "/**\n * @deprecated Use col_ai_score.js instead\n */\n\n/**\n *\
              \ AI Score Column\n *\n * Displays AI lead quality score with progress\
              \ bar visualization.\n * Color coding based on score:\n * - Green (80+):\
              \ High quality\n * - Yellow (50-79): Medium quality\n * - Red (<50):\
              \ Low quality\n *\n * Field: ai_score (number 0-100)\n */\n\nconst {\
              \ React, ReactDOM, antd } = ctx;\nconst { Tooltip } = antd;\nconst h\
              \ = React.createElement;\n\n// Theme detection\nconst algorithm = ctx.antdConfig?.theme?.algorithm;\n\
              const darkAlgo = ctx.antd.theme.darkAlgorithm;\nconst isDark = Array.isArray(algorithm)\n\
              \  ? algorithm.some(fn => fn === darkAlgo)\n  : algorithm === darkAlgo;\n\
              const T = ctx.themeToken || {};\n\n// ==================== Configuration\
              \ ====================\nconst SCORE_CONFIG = {\n  high: { min: 80, color:\
              \ T.colorSuccess || '#22c55e', gradient: 'linear-gradient(90deg, #22c55e,\
              \ #10b981)', label: 'High' },\n  medium: { min: 50, color: T.colorWarning\
              \ || '#f59e0b', gradient: 'linear-gradient(90deg, #f59e0b, #eab308)',\
              \ label: 'Medium' },\n  low: { min: 0, color: T.colorError || '#ef4444',\
              \ gradient: 'linear-gradient(90deg, #ef4444, #f97316)', label: 'Low'\
              \ },\n};\n\n// ==================== Styles ====================\nconst\
              \ styles = {\n  container: {\n    display: 'flex',\n    flexDirection:\
              \ 'column',\n    gap: 6,\n    minWidth: 120,\n  },\n  header: {\n  \
              \  display: 'flex',\n    justifyContent: 'space-between',\n    alignItems:\
              \ 'center',\n  },\n  scoreValue: {\n    fontWeight: 700,\n    fontSize:\
              \ 16,\n  },\n  aiBadge: {\n    background: 'linear-gradient(135deg,\
              \ rgba(16, 185, 129, 0.2), rgba(6, 182, 212, 0.2))',\n    color: T.colorSuccess\
              \ || '#10b981',\n    fontSize: 10,\n    padding: '2px 6px',\n    borderRadius:\
              \ 4,\n    fontWeight: 600,\n    display: 'flex',\n    alignItems: 'center',\n\
              \    gap: 4,\n  },\n  progressBar: {\n    height: 6,\n    background:\
              \ isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.06)',\n    borderRadius:\
              \ 3,\n    overflow: 'hidden',\n  },\n  progressFill: {\n    height:\
              \ '100%',\n    borderRadius: 3,\n    transition: 'width 0.5s ease',\n\
              \  },\n  label: {\n    fontSize: 11,\n    marginTop: 2,\n  },\n};\n\n\
              // ==================== Helper Functions ====================\nfunction\
              \ getScoreConfig(score) {\n  const numScore = Number(score) || 0;\n\
              \  if (numScore >= SCORE_CONFIG.high.min) return SCORE_CONFIG.high;\n\
              \  if (numScore >= SCORE_CONFIG.medium.min) return SCORE_CONFIG.medium;\n\
              \  return SCORE_CONFIG.low;\n}\n\n// ==================== Component\
              \ ====================\nfunction AiScoreColumn() {\n  const record =\
              \ ctx.record || {};\n  const score = record.ai_score;\n  const numScore\
              \ = Number(score) || 0;\n  const config = getScoreConfig(numScore);\n\
              \n  // AI icon SVG\n  const aiIcon = h('svg', {\n    width: 10,\n  \
              \  height: 10,\n    viewBox: '0 0 24 24',\n    fill: 'none',\n    stroke:\
              \ 'currentColor',\n    strokeWidth: 2,\n  },\n    h('path', { d: 'M12\
              \ 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1' })\n  );\n\
              \n  return h('div', { style: styles.container },\n    // Header row\
              \ with score and AI badge\n    h('div', { style: styles.header },\n\
              \      h('span', { style: { ...styles.scoreValue, color: config.color\
              \ } }, numScore),\n      h('span', { style: styles.aiBadge }, aiIcon,\
              \ 'AI')\n    ),\n    // Progress bar\n    h('div', { style: styles.progressBar\
              \ },\n      h('div', {\n        style: {\n          ...styles.progressFill,\n\
              \          width: `${numScore}%`,\n          background: config.gradient,\n\
              \        },\n      })\n    ),\n    // Label\n    h('span', { style:\
              \ { ...styles.label, color: config.color } }, config.label)\n  );\n\
              }\n\n// ==================== Render ====================\nconst root\
              \ = ReactDOM.createRoot(ctx.element);\nroot.render(h(AiScoreColumn));\n\
              \n// Handle refresh\nif (ctx.resource) {\n  ctx.resource.on?.('refresh',\
              \ () => {\n    root.render(h(AiScoreColumn));\n  });\n}\n"
