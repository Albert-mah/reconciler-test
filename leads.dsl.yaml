    jsSettings:
      runJs:
        code: "/**\n * Leads Stats Filter Block\n *\n * Button+Badge clickable filters\
          \ for the target lead list block.\n * Table: nb_crm_leads\n */\n\nconst\
          \ TARGET_BLOCK_UID = 'b3f6e318381';\n\nconst { useState, useEffect } = ctx.React;\n\
          const { Button, Badge, Space, Spin } = ctx.antd;\n\nconst t = (key, opts)\
          \ => ctx.t(key, { ns: 'nb_crm.leads', ...opts });\n\n// ====================\
          \ Stat Buttons Config ====================\nconst STATS = [\n  { key: 'all',\
          \ label: t('All Leads'), filter: null },\n  { key: 'new', label: t('New'),\
          \ filter: { status: 'new' } },\n  { key: 'working', label: t('Working'),\
          \ filter: { status: 'working' } },\n  { key: 'qualified', label: t('Qualified'),\
          \ filter: { status: 'qualified' } },\n  { key: 'unqualified', label: t('Unqualified'),\
          \ filter: { status: 'unqualified' } },\n];\n\n// ==================== Data\
          \ Hook ====================\nfunction useStats() {\n  const [counts, setCounts]\
          \ = useState({});\n  const [loading, setLoading] = useState(true);\n\n \
          \ useEffect(() => {\n    const fetch = async () => {\n      try {\n    \
          \    const results = await Promise.all(\n          STATS.map(s => ctx.api.request({\n\
          \            url: 'nb_crm_leads:list',\n            params: { pageSize:\
          \ 1, ...(s.filter && { filter: JSON.stringify(s.filter) }) },\n        \
          \  }))\n        );\n        const c = {};\n        STATS.forEach((s, i)\
          \ => { c[s.key] = results[i]?.data?.meta?.count || 0; });\n        setCounts(c);\n\
          \      } catch (e) { console.error('Stats fetch failed:', e); }\n      setLoading(false);\n\
          \    };\n    fetch();\n  }, []);\n\n  return { counts, loading };\n}\n\n\
          // ==================== Main Component ====================\nconst StatsFilter\
          \ = () => {\n  const { counts, loading } = useStats();\n  const [active,\
          \ setActive] = useState('all');\n\n  const handleClick = async (stat) =>\
          \ {\n    setActive(stat.key);\n    try {\n      const target = ctx.engine?.getModel(TARGET_BLOCK_UID);\n\
          \      if (!target) { ctx.message?.warning('Target block not found'); return;\
          \ }\n      target.resource.addFilterGroup(ctx.model.uid, stat.filter ||\
          \ { $and: [] });\n      await target.resource.refresh();\n    } catch (e)\
          \ { console.error('Filter failed:', e); }\n  };\n\n  if (loading) return\
          \ <Spin size=\"small\" />;\n\n  return (\n    <Space wrap size={[8, 8]}>\n\
          \      {STATS.map(s => (\n        <Button key={s.key} type={active === s.key\
          \ ? 'primary' : 'default'} onClick={() => handleClick(s)}>\n          {s.label}{'\
          \ '}\n          <Badge count={counts[s.key] ?? 0} showZero overflowCount={9999}\n\
          \            style={{ marginLeft: 4,\n              backgroundColor: active\
          \ === s.key ? '#fff' : '#f0f0f0',\n              color: active === s.key\
          \ ? '#1677ff' : 'rgba(0,0,0,0.65)',\n              boxShadow: 'none' }}\
          \ />\n        </Button>\n      ))}\n    </Space>\n  );\n};\n\nctx.render(<StatsFilter\
          \ />);\n"
