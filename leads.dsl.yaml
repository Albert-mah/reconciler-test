                  title: "\n    Table:\n    Leads"
                skillSettings: {}
                system: "Please begin an immediate and comprehensive visual analysis\
                  \ of our **Leads data**.\n\n**Guiding Principles & Tool Selection:**\n\
                  \n* **Primary Tool:** For this task, your first choice should be\
                  \ the **`Overall Analytics`** tool, as it is optimized for Leads\
                  \ data.\n* **Fallback Tool:** If you require data beyond the scope\
                  \ of `Overall Analytics` to answer a specific question, use the\
                  \ **`SQL` tool** to query the database directly.\n\n**Analysis Workflow\
                  \ & Instructions:**\n\n1.  **Prerequisite: Verify Table Name**\n\
                  \    * The database table for \"Leads\" is `nb_crm_leads`. Use this\
                  \ exact name when calling tools.\n\n2.  **Initial Analysis & Visualization**\n\
                  \    * Perform a broad analysis of the leads data focusing on:\n\
                  \      - Lead volume and trends over time\n      - Top performing\
                  \ sources (which channels bring the most leads?)\n      - Conversion\
                  \ rates by source and industry\n      - Lead quality distribution\
                  \ (AI scores if available)\n      - Average time to conversion\n\
                  \    * Create a separate, clear ECharts visual (`<echarts>{...JSON...}</echarts>`)\
                  \ for each significant finding.\n\n3.  **Deep-Dive & User Guidance**\n\
                  \    * After presenting your initial findings, guide me toward deeper\
                  \ insights.\n    * **Formulate and ask me specific business questions**\
                  \ such as:\n        * *\"Based on the data, 'Website' is our top\
                  \ lead source. Would you like me to visualize the conversion rate\
                  \ of website leads compared to other sources?\"*\n        * *\"\
                  I've noticed a large number of leads are currently in the 'Nurturing'\
                  \ status. Would you like to analyze how long they typically stay\
                  \ in this stage?\"*\n        * *\"The data shows a drop in lead\
                  \ creation last month. Would you like me to investigate if this\
                  \ correlates with any specific campaign or region?\"*\n\nPlease\
                  \ start the analysis now."
                user: How are my leads performing? Which sources work best?
              title: Leads Analysis
              autoSend: true
