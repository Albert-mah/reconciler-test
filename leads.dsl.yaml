    - uid: c70f578bbb4
      use: JSColumn
      stepParams:
        tableColumnSettings:
          title:
            title: Created
        jsSettings:
          runJs:
            version: v1
            code: "/**\n * Created Ago Column - Leads Module\n * Shows \"Created X\
              \ days ago\" with relative time\n *\n * Table: nb_crm_leads\n * Field:\
              \ createdAt\n */\n\nconst record = ctx.record;\nconst createdDate =\
              \ record?.createdAt;\n\n// Theme detection\nconst algorithm = ctx.antdConfig?.theme?.algorithm;\n\
              const darkAlgo = ctx.antd.theme.darkAlgorithm;\nconst isDark = Array.isArray(algorithm)\n\
              \  ? algorithm.some(fn => fn === darkAlgo)\n  : algorithm === darkAlgo;\n\
              const T = ctx.themeToken || {};\n\n// i18n\nconst t = (key, opts) =>\
              \ ctx.t(key, { ns: 'nb_crm.leads', ...opts });\n\n// Format relative\
              \ date helper\nconst formatRelativeDate = (dateStr) => {\n  if (!dateStr)\
              \ return { text: '-', color: T.colorTextTertiary || '#bfbfbf' };\n\n\
              \  const date = new Date(dateStr);\n  const now = new Date();\n  const\
              \ diffMs = now - date;\n  const diffDays = Math.floor(diffMs / 86400000);\n\
              \n  let text, color;\n\n  if (diffDays === 0) {\n    text = t('today');\n\
              \    color = T.colorSuccess || '#52c41a';\n  } else if (diffDays ===\
              \ 1) {\n    text = t('yesterday');\n    color = T.colorSuccess || '#52c41a';\n\
              \  } else if (diffDays < 7) {\n    text = t('{{count}}d ago', { count:\
              \ diffDays });\n    color = T.colorPrimary || '#1890ff';\n  } else if\
              \ (diffDays < 30) {\n    const weeks = Math.floor(diffDays / 7);\n \
              \   text = t('{{count}}w ago', { count: weeks });\n    color = T.colorWarning\
              \ || '#faad14';\n  } else {\n    const months = Math.floor(diffDays\
              \ / 30);\n    text = t('{{count}}mo ago', { count: months });\n    color\
              \ = T.colorError || '#ff4d4f';\n  }\n\n  return { text, color };\n};\n\
              \nconst { text, color } = formatRelativeDate(createdDate);\n\nctx.render(\n\
              \  <span style={{ fontSize: '13px', whiteSpace: 'nowrap' }}>\n    <span\
              \ style={{ color: color, marginRight: '4px' }}>●</span>\n    <span style={{\
              \ color: T.colorTextSecondary || '#595959' }}>Created {text}</span>\n\
              \  </span>\n);\n"
