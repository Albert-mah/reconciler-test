  - uid: 142c7cbc555
    use: FilterFormBlock
    grid:
      uid: b1f16c7f041
      use: FilterFormGrid
      items:
      - uid: 5cdebcce9c3
        use: JSItem
        stepParams:
          jsSettings:
            runJs:
              code: "/**\n * Leads Stats Filter Block\n * Supports URL params: ?status=new&rating=hot\
                \ etc.\n */\n\nconst TARGET_BLOCK_UID = 'b3f6e318381';\n\nconst {\
                \ useState, useEffect } = ctx.React;\nconst { Button, Badge, Space,\
                \ Spin, Divider, Typography } = ctx.antd;\nconst { Text } = ctx.antd.Typography;\n\
                \nconst t = (key, opts) => ctx.t(key, { ns: 'nb_crm.leads', ...opts\
                \ });\n\n// ==================== Filter Config ====================\n\
                const STATS = [\n  // --- Status filters ---\n  { key: 'all', label:\
                \ 'All', filter: null, group: 'status' },\n  { key: 'new', label:\
                \ 'New', filter: { status: { $eq: 'new' } }, group: 'status' },\n\
                \  { key: 'working', label: 'Working', filter: { status: { $eq: 'working'\
                \ } }, group: 'status' },\n  { key: 'qualified', label: 'Qualified',\
                \ filter: { status: { $eq: 'qualified' } }, group: 'status' },\n \
                \ { key: 'unqualified', label: 'Unqualified', filter: { status: {\
                \ $eq: 'unqualified' } }, group: 'status' },\n  // --- Composite filters\
                \ ---\n  { key: 'hot', label: '\U0001F525 Hot', filter: { $and: [{\
                \ rating: { $eq: 'hot' } }, { status: { $ne: 'unqualified' } }] },\
                \ group: 'smart' },\n  { key: 'today', label: 'Today', filterFn: ()\
                \ => {\n    const today = ctx.libs.dayjs().format('YYYY-MM-DD');\n\
                \    return { createdAt: { $dateOn: today } };\n  }, group: 'smart'\
                \ },\n  { key: 'this_week', label: 'This Week', filterFn: () => {\n\
                \    const start = ctx.libs.dayjs().startOf('week').format('YYYY-MM-DD');\n\
                \    const end = ctx.libs.dayjs().endOf('week').format('YYYY-MM-DD');\n\
                \    return { createdAt: { $dateBetween: [start, end] } };\n  }, group:\
                \ 'smart' },\n  { key: 'this_month', label: 'This Month', filterFn:\
                \ () => {\n    const start = ctx.libs.dayjs().startOf('month').format('YYYY-MM-DD');\n\
                \    const end = ctx.libs.dayjs().endOf('month').format('YYYY-MM-DD');\n\
                \    return { createdAt: { $dateBetween: [start, end] } };\n  }, group:\
                \ 'smart' },\n  { key: 'no_owner', label: 'Unassigned', filter: {\
                \ owner_id: { $empty: true } }, group: 'smart' },\n  { key: 'high_value',\
                \ label: 'Enterprise', filter: { number_of_employees: { $in: ['1001-5000',\
                \ '5001-10000', '10000+'] } }, group: 'smart' },\n];\n\n// ====================\
                \ Read URL params ====================\nconst _search = ctx.router?.state?.location?.search\
                \ || '';\nconst _getParam = (key) => {\n  const m = _search.match(new\
                \ RegExp('[?&]' + key + '=([^&]*)'));\n  return m ? decodeURIComponent(m[1])\
                \ : null;\n};\n\nconst _urlStatus = _getParam('status');\nconst _urlFilter\
                \ = _getParam('filter');\nconst _urlKey = _urlStatus || _urlFilter;\n\
                const INIT_KEY = STATS.find(s => s.key === _urlKey) ? _urlKey : 'all';\n\
                \n// ==================== Data Hook ====================\nfunction\
                \ useStats() {\n  const [counts, setCounts] = useState({});\n  const\
                \ [loading, setLoading] = useState(true);\n\n  useEffect(() => {\n\
                \    const fetchCounts = async () => {\n      try {\n        // Only\
                \ count status-based filters (not smart filters to save requests)\n\
                \        const statusStats = STATS.filter(s => s.group === 'status');\n\
                \        const results = await Promise.all(\n          statusStats.map(s\
                \ => ctx.api.request({\n            url: 'nb_crm_leads:list',\n  \
                \          params: { pageSize: 1, ...(s.filter && { filter: JSON.stringify(s.filter)\
                \ }) },\n          }))\n        );\n        const c = {};\n      \
                \  statusStats.forEach((s, i) => { c[s.key] = results[i]?.data?.meta?.count\
                \ || 0; });\n        setCounts(c);\n      } catch (e) { console.error('Stats\
                \ fetch failed:', e); }\n      setLoading(false);\n    };\n    fetchCounts();\n\
                \  }, []);\n\n  return { counts, loading };\n}\n\n// ====================\
                \ Main Component ====================\nconst StatsFilter = () => {\n\
                \  const { counts, loading } = useStats();\n  const [active, setActive]\
                \ = useState(INIT_KEY);\n  const appliedRef = ctx.React.useRef(false);\n\
                \n  const applyFilter = async (stat) => {\n    try {\n      const\
                \ target = ctx.engine?.getModel(TARGET_BLOCK_UID);\n      if (!target)\
                \ return;\n      const filterVal = stat.filterFn ? stat.filterFn()\
                \ : (stat.filter || { $and: [] });\n      target.resource.addFilterGroup(ctx.model.uid,\
                \ filterVal);\n      await target.resource.refresh();\n    } catch\
                \ (e) { console.error('Filter failed:', e); }\n  };\n\n  // Auto-apply\
                \ from URL param\n  useEffect(() => {\n    if (!appliedRef.current\
                \ && INIT_KEY !== 'all') {\n      appliedRef.current = true;\n   \
                \   const stat = STATS.find(s => s.key === INIT_KEY);\n      if (stat)\
                \ setTimeout(() => applyFilter(stat), 500);\n    }\n  }, []);\n\n\
                \  const handleClick = async (stat) => {\n    setActive(stat.key);\n\
                \    await applyFilter(stat);\n  };\n\n  if (loading) return <Spin\
                \ />;\n\n  const statusGroup = STATS.filter(s => s.group === 'status');\n\
                \  const smartGroup = STATS.filter(s => s.group === 'smart');\n\n\
                \  return (\n    <Space wrap size={[8, 8]} split={<Divider type=\"\
                vertical\" style={{ margin: 0 }} />}>\n      <Space wrap size={[8,\
                \ 8]}>\n        {statusGroup.map(s => (\n          <Button key={s.key}\
                \ type={active === s.key ? 'primary' : 'default'} onClick={() => handleClick(s)}>\n\
                \            {s.label}{counts[s.key] != null ? ' ' : ''}\n       \
                \     {counts[s.key] != null && (\n              <Badge count={counts[s.key]}\
                \ showZero overflowCount={9999}\n                style={{ marginLeft:\
                \ 4,\n                  backgroundColor: active === s.key ? '#fff'\
                \ : '#f0f0f0',\n                  color: active === s.key ? '#1677ff'\
                \ : 'rgba(0,0,0,0.65)',\n                  boxShadow: 'none' }} />\n\
                \            )}\n          </Button>\n        ))}\n      </Space>\n\
                \      <Space wrap size={[8, 8]}>\n        {smartGroup.map(s => (\n\
                \          <Button key={s.key} type={active === s.key ? 'primary'\
                \ : 'default'}\n            style={active !== s.key ? { borderStyle:\
                \ 'dashed' } : {}}\n            onClick={() => handleClick(s)}>\n\
                \            {s.label}\n          </Button>\n        ))}\n      </Space>\n\
                \    </Space>\n  );\n};\n\nctx.render(<StatsFilter />);\n"
