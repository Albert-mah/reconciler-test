    - uid: 720cbfa7842
      use: JSColumn
      stepParams:
        tableColumnSettings:
          title:
            title: Lead Name/Company
          width:
            width: 200
        jsSettings:
          runJs:
            version: v1
            code: "/**\n * Lead Info Column (Multi-field)\n *\n * Displays lead name\
              \ with company in a combined cell.\n * - Primary: Lead name (bold)\n\
              \ *   - If converted: clickable -> opens converted contact/customer\
              \ detail\n *   - If not converted: plain text\n * - Secondary: Company\
              \ name (gray, smaller)\n *\n * Table: nb_crm_leads\n * Fields: name,\
              \ company, converted_contact_id, converted_customer_id\n */\n\nconst\
              \ { Tooltip, Typography, Space } = ctx.antd;\nconst { Text, Link } =\
              \ Typography;\n\n// Theme detection\nconst algorithm = ctx.antdConfig?.theme?.algorithm;\n\
              const darkAlgo = ctx.antd.theme.darkAlgorithm;\nconst isDark = Array.isArray(algorithm)\n\
              \  ? algorithm.some(fn => fn === darkAlgo)\n  : algorithm === darkAlgo;\n\
              const T = ctx.themeToken || {};\n\n// i18n\nconst t = (key, opts) =>\
              \ ctx.t(key, { ns: 'nb_crm.leads', ...opts });\n\n// ====================\
              \ Config ====================\n// Detail popup view UIDs\nconst CONTACT_DETAIL_VIEW_UID\
              \ = 'zxsog8ixwmu';  // Contact detail view\nconst CUSTOMER_DETAIL_VIEW_UID\
              \ = 'wsb6b480gtj';  // Customer detail view\n\n// ====================\
              \ Styles ====================\nconst styles = {\n  container: {\n  \
              \  display: 'flex',\n    flexDirection: 'column',\n    gap: 2,\n   \
              \ minWidth: 120,\n  },\n  placeholder: {\n    fontSize: 13,\n    color:\
              \ T.colorTextTertiary || '#9ca3af',\n    fontStyle: 'italic',\n  },\n\
              };\n\n// ==================== Component ====================\nconst\
              \ LeadInfoColumn = () => {\n  const record = ctx.record || {};\n  const\
              \ name = record.name || '';\n  const company = record.company || '';\n\
              \n  // Check if converted\n  const convertedContactId = record.converted_contact_id;\n\
              \  const convertedCustomerId = record.converted_customer_id;\n  const\
              \ hasConvertedContact = !!convertedContactId;\n  const hasConvertedCustomer\
              \ = !!convertedCustomerId;\n\n  // Click name to open contact detail\
              \ (only clickable when converted to contact)\n  const handleNameClick\
              \ = async (e) => {\n    e.stopPropagation();\n    if (!hasConvertedContact\
              \ || !convertedContactId) return;\n\n    if (ctx.openView && CONTACT_DETAIL_VIEW_UID\
              \ && CONTACT_DETAIL_VIEW_UID !== 'xxxxxxxxxx') {\n      try {\n    \
              \    await ctx.openView(CONTACT_DETAIL_VIEW_UID, {\n          mode:\
              \ 'drawer',\n          size: 'large',\n          collectionName: 'nb_crm_contacts',\n\
              \          dataSourceKey: 'main',\n          filterByTk: convertedContactId,\n\
              \        });\n      } catch (err) {\n        console.error('Failed to\
              \ open contact detail:', err);\n      }\n    }\n  };\n\n  // Click company\
              \ to open customer detail (only clickable when converted to customer)\n\
              \  const handleCompanyClick = async (e) => {\n    e.stopPropagation();\n\
              \    if (!hasConvertedCustomer || !convertedCustomerId) return;\n\n\
              \    if (ctx.openView && CUSTOMER_DETAIL_VIEW_UID && CUSTOMER_DETAIL_VIEW_UID\
              \ !== 'xxxxxxxxxx') {\n      try {\n        await ctx.openView(CUSTOMER_DETAIL_VIEW_UID,\
              \ {\n          mode: 'drawer',\n          size: 'large',\n         \
              \ collectionName: 'nb_crm_customers',\n          dataSourceKey: 'main',\n\
              \          filterByTk: convertedCustomerId,\n        });\n      } catch\
              \ (err) {\n        console.error('Failed to open customer detail:',\
              \ err);\n      }\n    }\n  };\n\n  if (!name && !company) {\n    return\
              \ <span style={styles.placeholder}>—</span>;\n  }\n\n  const tooltipLines\
              \ = [\n    name && t('Name: {{name}}', { name: name }),\n    company\
              \ && t('Company: {{company}}', { company: company }),\n  ];\n  if (hasConvertedContact)\
              \ {\n    tooltipLines.push('Converted to Contact (click to view)');\n\
              \  }\n  if (hasConvertedCustomer) {\n    tooltipLines.push('Converted\
              \ to Customer (click to view)');\n  }\n  const tooltipContent = tooltipLines.filter(Boolean).join('\\\
              n');\n\n  return (\n    <Tooltip title={tooltipContent}>\n      <div\
              \ style={styles.container}>\n        {name && (hasConvertedContact ?\
              \ (\n          <Link\n            strong\n            onClick={handleNameClick}\n\
              \            style={{ fontSize: 14, overflow: 'hidden', textOverflow:\
              \ 'ellipsis', whiteSpace: 'nowrap' }}\n          >\n            {name}\n\
              \          </Link>\n        ) : (\n          <Text\n            strong\n\
              \            style={{ fontSize: 14, color: T.colorText || '#111827',\
              \ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap'\
              \ }}\n          >\n            {name}\n          </Text>\n        ))}\n\
              \        {company && (hasConvertedCustomer ? (\n          <Link\n  \
              \          onClick={handleCompanyClick}\n            style={{ fontSize:\
              \ 12, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap'\
              \ }}\n          >\n            {company}\n          </Link>\n      \
              \  ) : (\n          <Text\n            type=\"secondary\"\n        \
              \    style={{ fontSize: 12, overflow: 'hidden', textOverflow: 'ellipsis',\
              \ whiteSpace: 'nowrap' }}\n          >\n            {company}\n    \
              \      </Text>\n        ))}\n      </div>\n    </Tooltip>\n  );\n};\n\
              \n// ==================== Render ====================\nctx.render(<LeadInfoColumn\
              \ />);\n"
    - uid: d8d8a4a3a80
      use: JSColumn
      stepParams:
        tableColumnSettings:
          title:
            title: Contact
          width:
            width: 200
        jsSettings:
          runJs:
            version: v1
            code: "/**\n * Lead Contact Column (Multi-field)\n *\n * Displays lead\
              \ contact information with email and phone.\n * - Primary: Email (with\
              \ icon)\n *   - If converted: clickable -> opens converted contact detail\n\
              \ *   - If not converted: plain text\n * - Secondary: Phone/Mobile (with\
              \ icon)\n * No masking - shows full contact details.\n *\n * Table:\
              \ nb_crm_leads\n * Fields: email, phone, mobile_phone, converted_contact_id\n\
              \ */\n\nconst { Tooltip, Typography, Space } = ctx.antd;\nconst { Text,\
              \ Link } = Typography;\nconst { MailOutlined, PhoneOutlined } = ctx.antdIcons\
              \ || {};\n\n// Theme detection\nconst algorithm = ctx.antdConfig?.theme?.algorithm;\n\
              const darkAlgo = ctx.antd.theme.darkAlgorithm;\nconst isDark = Array.isArray(algorithm)\n\
              \  ? algorithm.some(fn => fn === darkAlgo)\n  : algorithm === darkAlgo;\n\
              const T = ctx.themeToken || {};\n\n// i18n\nconst t = (key, opts) =>\
              \ ctx.t(key, { ns: 'nb_crm.leads', ...opts });\n\n// ====================\
              \ Config ====================\n// Detail popup view UIDs\nconst CONTACT_DETAIL_VIEW_UID\
              \ = 'zxsog8ixwmu';  // Contact detail view (converted)\nconst LEAD_DETAIL_VIEW_UID\
              \ = '6im0lrahx9q';     // Lead detail view (not converted)\n\n// ====================\
              \ Styles ====================\nconst styles = {\n  container: {\n  \
              \  display: 'flex',\n    flexDirection: 'column',\n    gap: 4,\n   \
              \ minWidth: 150,\n  },\n  row: {\n    display: 'flex',\n    alignItems:\
              \ 'center',\n    gap: 6,\n  },\n  icon: {\n    display: 'flex',\n  \
              \  alignItems: 'center',\n    opacity: 0.7,\n    flexShrink: 0,\n  },\n\
              \  placeholder: {\n    fontSize: 13,\n    color: T.colorTextTertiary\
              \ || '#9ca3af',\n    fontStyle: 'italic',\n  },\n};\n\n// ====================\
              \ SVG Icons (fallback if antdIcons not available) ====================\n\
              const EmailIcon = () => (\n  <svg\n    width={12}\n    height={12}\n\
              \    viewBox=\"0 0 24 24\"\n    fill=\"none\"\n    stroke={T.colorTextSecondary\
              \ || '#6b7280'}\n    strokeWidth={2}\n    strokeLinecap=\"round\"\n\
              \    strokeLinejoin=\"round\"\n  >\n    <path d=\"M4 4h16c1.1 0 2 .9\
              \ 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z\" />\n  \
              \  <polyline points=\"22,6 12,13 2,6\" />\n  </svg>\n);\n\nconst PhoneIcon\
              \ = () => (\n  <svg\n    width={12}\n    height={12}\n    viewBox=\"\
              0 0 24 24\"\n    fill=\"none\"\n    stroke={T.colorTextSecondary ||\
              \ '#6b7280'}\n    strokeWidth={2}\n    strokeLinecap=\"round\"\n   \
              \ strokeLinejoin=\"round\"\n  >\n    <path d=\"M22 16.92v3a2 2 0 0 1-2.18\
              \ 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0\
              \ 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0\
              \ .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2\
              \ 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z\" />\n\
              \  </svg>\n);\n\n// ==================== Component ====================\n\
              const LeadContactColumn = () => {\n  const record = ctx.record || {};\n\
              \  const email = record.email || '';\n  // Prefer mobile_phone over\
              \ phone\n  const phoneNumber = record.mobile_phone || record.phone ||\
              \ '';\n\n  // Check if converted to contact\n  const convertedContactId\
              \ = record.converted_contact_id;\n  const hasConvertedContact = !!convertedContactId;\n\
              \n  // Click to open detail view\n  // - If converted: open contact\
              \ detail with contact ID\n  // - If not converted: open lead detail\
              \ with lead ID\n  const handleClick = async (e) => {\n    e.stopPropagation();\n\
              \    if (!ctx.openView) return;\n\n    try {\n      if (hasConvertedContact\
              \ && convertedContactId) {\n        // Open contact detail\n       \
              \ await ctx.openView(CONTACT_DETAIL_VIEW_UID, {\n          mode: 'drawer',\n\
              \          size: 'large',\n          collectionName: 'nb_crm_contacts',\n\
              \          dataSourceKey: 'main',\n          filterByTk: convertedContactId,\n\
              \        });\n      } else if (record.id) {\n        // Open lead detail\n\
              \        await ctx.openView(LEAD_DETAIL_VIEW_UID, {\n          mode:\
              \ 'drawer',\n          size: 'large',\n          collectionName: 'nb_crm_leads',\n\
              \          dataSourceKey: 'main',\n          filterByTk: record.id,\n\
              \        });\n      }\n    } catch (err) {\n      console.error('Failed\
              \ to open detail:', err);\n    }\n  };\n\n  if (!email && !phoneNumber)\
              \ {\n    return <span style={styles.placeholder}>—</span>;\n  }\n\n\
              \  const tooltipLines = [\n    email && t('Email: {{email}}', { email:\
              \ email }),\n    record.mobile_phone && t('Mobile: {{mobile_phone}}',\
              \ { mobile_phone: record.mobile_phone }),\n    record.phone && t('Phone:\
              \ {{phone}}', { phone: record.phone }),\n    hasConvertedContact ? 'Click\
              \ to view Contact' : 'Click to view Lead',\n  ];\n  const tooltipContent\
              \ = tooltipLines.filter(Boolean).join('\\n');\n\n  return (\n    <Tooltip\
              \ title={tooltipContent}>\n      <div style={styles.container}>\n  \
              \      {email && (\n          <div style={styles.row}>\n           \
              \ <span style={styles.icon}>\n              {MailOutlined ? <MailOutlined\
              \ style={{ fontSize: 12, color: T.colorTextSecondary || '#6b7280' }}\
              \ /> : <EmailIcon />}\n            </span>\n            <Link\n    \
              \          onClick={handleClick}\n              style={{ fontSize: 12,\
              \ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',\
              \ cursor: 'pointer' }}\n            >\n              {email}\n     \
              \       </Link>\n          </div>\n        )}\n        {phoneNumber\
              \ && (\n          <div style={styles.row}>\n            <span style={styles.icon}>\n\
              \              {PhoneOutlined ? <PhoneOutlined style={{ fontSize: 12,\
              \ color: T.colorTextSecondary || '#6b7280' }} /> : <PhoneIcon />}\n\
              \            </span>\n            <Text\n              type=\"secondary\"\
              \n              style={{ fontSize: 12, overflow: 'hidden', textOverflow:\
              \ 'ellipsis', whiteSpace: 'nowrap' }}\n            >\n             \
              \ {phoneNumber}\n            </Text>\n          </div>\n        )}\n\
              \      </div>\n    </Tooltip>\n  );\n};\n\n// ==================== Render\
              \ ====================\nctx.render(<LeadContactColumn />);\n"
